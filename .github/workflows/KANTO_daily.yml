name: "Daily KANTO Trigger and Update"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"
    - cron: "5 15 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest

    # ==========================================
    # GitHub Pagesへのデプロイに必須の環境設定
    # ==========================================
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "Trigger XREA API"
        run: |
          TS=$(date +%s)
          SECRET=${{ secrets.XREA_SECRET }}
          SIG=$(echo -n "$TS+$SECRET" | sha256sum | awk '{print $1}')
          curl -s "${{ secrets.XREA_URL }}?ts=$TS&sig=$SIG" > /dev/null &

      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "Install dependencies"
        # package.jsonを無視して、必要なこの3つだけをピンポイントでインストールします
        run: npm install node-fetch iconv-lite fast-xml-parser

      - name: "Run News script"
        run: node js/newsNode.js

      - name: "Commit and Push"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json
          git diff --cached --quiet || git commit -m "update news json"
          git push origin main

      - name: "Trigger InLand PHP"
        run: curl -sS https://turiiko.shop/actions/inLandwhether.php > /dev/null &

      - name: "Upload Artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: "Deploy to GitHub Pages"
        id: deployment # 🌟 URL出力を受け取るためにIDを追加
        uses: actions/deploy-pages@v4
