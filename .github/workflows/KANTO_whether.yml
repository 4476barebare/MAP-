name: KANTO Whether Control

on:
  workflow_dispatch: # 前段からの連鎖トリガー、および手動実行用

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 前段のプッシュがGitHub側に反映されるまで10秒待ちます
      - name: Wait for remote synchronization
        run: sleep 10

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # 最新の KANTO_load.json を確実にローカルに引っ張ってきます
      - name: Pull latest changes
        run: |
          git pull origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run KANTO Control
        run: |
          node js/KANTO_control.js

      # ファイル書き込みが完全に終了してクローズされるのを3秒待ちます
      - name: Wait for file write completion
        run: sleep 3

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 1. 生成されたCSVファイルを一度安全に退避させる
          git stash --include-untracked
          
          # 2. プッシュ直前に最新のリモート状態を同期（エラー128対策）
          git pull --rebase origin main
          
          # 3. 退避させたCSVファイルを復元する
          git stash pop || true
          
          git add data/*.csv || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update whether csv"
          git push origin main
