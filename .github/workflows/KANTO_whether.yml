name: Coastal Area Weather Control

on:
  workflow_dispatch:
  schedule:
    - cron: '30 16 * * *' # 1日1回自動実行（JST 01:30 相当）

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ========================================================
      # 🌟 JSを実行（第1引数: 地域名, 第2引数: 参照するURL）
      # ========================================================
      - name: Run Coastal Area Control
        run: |
          node js/coastalArea_control.js KANTO "https://turiiko.shop/actions/data/KANTO_load.json"

      # ========================================================
      # スクリプトが更新したデータをリポジトリに保存
      # ========================================================
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto: [coastalArea] 天気コントロール処理の更新を反映"
            git push origin main
          else
            echo "✅ データに変更がなかったためコミットをスキップしました。"
          fi

      # ========================================================
      # GitHub Pages への直接デプロイ
      # ========================================================
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
