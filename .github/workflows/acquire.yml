name: Acquire Crowd Images

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'   # 午前7:30
    - cron: '30 19 * * *'  # 午後7:30

jobs:
  acquire:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run acquire script
        run: node js/acquireCrowds.cjs

      - name: Commit and push files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "update images" || echo "no changes"

          git push
