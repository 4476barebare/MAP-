name: Acquire Crowd Images

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21,9 * * *'  # JST 06:15 / 18:15

# GitHub Pagesへの直接デプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  acquire:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 20から24に変更し、エラーの原因だった cache: 'npm' を完全に削除しました

      - name: Run acquire script
        run: node js/acquireCrowds.cjs

      # ========================================================
      # GitHub Pages への直接デプロイ
      # ========================================================
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
