name: Acquire Crowd Images

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21,9 * * *'  # JST 06:15 / 18:15

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  acquire:
    runs-on: ubuntu-latest
    
    # ==========================================
    # GitHub Pagesへのデプロイに必須の環境設定
    # ==========================================
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run acquire script
        run: node js/acquireCrowds.cjs

      # ========================================================
      # 取得した画像をリポジトリに保存する処理
      # ========================================================
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 取得した画像などの変更をすべてステージング
          git add .
          
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto: 群衆画像の取得を反映"
            git push origin main
          else
            echo "✅ 画像に変更がなかったためコミットをスキップしました。"
          fi

      # ========================================================
      # GitHub Pages への直接デプロイ
      # ========================================================
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment # 🌟 URL出力を受け取るためにIDを追加
        uses: actions/deploy-pages@v4
