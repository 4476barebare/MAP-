name: JMA Cloud Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # canvas用のLinux依存（必須）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm install

      # 実行（ログ依存なし）
      - name: Run generator
        run: node js/JMA_cloudsGenerate.js

      # 成果物をGitHubに保存（ここが本体）
      - name: Upload generated images
        uses: actions/upload-artifact@v4
        with:
          name: jma-clouds
          path: output/
          if-no-files-found: error
