name: Daily XREA Trigger

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Call PHP
        run: |
          TS=$(date +%s)
          SECRET=${{ secrets.XREA_SECRET }}

          SIG=$(echo -n "$TS+$SECRET" | sha256sum | awk '{print $1}')

          curl -s "${{ secrets.XREA_URL }}?ts=$TS&sig=$SIG"
