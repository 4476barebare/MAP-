name: Daily KANTO whether request

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"
    - cron: "5 15 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger API
        run: |
          echo "=== API call triggered (Async) ==="
          TS=$(date +%s)
          SECRET=${{ secrets.XREA_SECRET }}
          SIG=$(echo -n "$TS+$SECRET" | sha256sum | awk '{print $1}')
          echo "Request: ts=$TS"
          curl -s "${{ secrets.XREA_URL }}?ts=$TS&sig=$SIG" > /dev/null &
          
          echo "=== Trigger done ==="
