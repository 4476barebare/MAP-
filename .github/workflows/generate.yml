name: Generate Rain Images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Nodeセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: canvas依存インストール
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: npm install
        run: npm install axios canvas

      - name: outputディレクトリ作成
        run: mkdir -p output

      - name: スクリプト実行
        run: node js/OM_cloudsGenerate.js

      - name: 変更をコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add output/*.png || true
          git commit -m "update rain images" || echo "no changes"
          git push
