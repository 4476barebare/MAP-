name: Generate Weather Maps

on:
  workflow_dispatch:   # 手動実行用
  schedule:
    - cron: '0 0 * * *' # 日本時間の9時に実行（UTC 0:00）

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger XREA Generation
        run: |
          # XREA上のPHPを叩いてバックグラウンドで画像生成を実行させる
          # 必要に応じて、XREA側で設定したシークレットトークンを付与してください
          curl -s "https://turiiko.shop/cloudGenerator/generate.php"
          
          echo "Generation triggered successfully."
