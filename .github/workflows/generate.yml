name: Generate Weather Maps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21,9 * * *'   # JST 06:00 / 18:00
    - cron: '5 21,9 * * *'   # JST 06:05 / 18:05（5分後）

jobs:
  generate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        area:
          - "CHIBA,34.7,36.0,139.6,141.1,0.15,9"
          - "KANAGAWA,35.75,138.9,34.9,139.9,0.15,9.5"

    steps:
      - name: Trigger XREA run.php
        run: |
          curl -s --max-time 10 "https://turiiko.shop/cloudGenerator/run.php?area=$(echo '${{ matrix.area }}' | sed 's/,/%2C/g')" > /dev/null &
          
          echo "Triggered: ${{ matrix.area }}"
