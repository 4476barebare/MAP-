name: Generate Weather Maps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'  # 3時間ごと実行

jobs:
  generate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        area:
          - "CHIBA,34.7,36.0,139.6,141.1,0.15,9"
          # - "TOKYO,..."

    steps:
      - name: Trigger XREA run.php
        run: |
          curl -s "https://turiiko.shop/cloudGenerator/run.php?area=$(echo '${{ matrix.area }}' | sed 's/,/%2C/g')"
          
          echo "Triggered: ${{ matrix.area }}"
