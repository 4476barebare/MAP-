name: KANTO Load CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # 1日1回のみ実行（JST 01:00 相当）

# すべてのリポジトリ操作・Pages・連鎖起動が不要になったため、特別な権限は一切不要です
permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XREA PHP API (Async)
        run: |
          # 1. 現在のタイムスタンプを取得
          TS=$(date +%s)
          SECRET="mZ4vP1wL9q"
          
          # 2. SHA256で署名（sig）を自動生成
          SIG=$(echo -n "${TS}+${SECRET}" | openssl dgst -sha256 | sed 's/^.* //')
          
          # 3. 2秒でタイムアウトを設定し、バックグラウンド(&)でXREAへリクエストを投げ捨ててすぐ終了する
          curl -s --max-time 2 "https://turiiko.shop/actions/whether_run.php?ts=${TS}&sig=${SIG}" > /dev/null 2>&1 &
          
          # 4. 完全に切り離すために1秒だけ待って終了
          sleep 1
          echo "XREA API triggered successfully."
