name: KANTO Load CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch API
        id: fetch_api
        run: |
          mkdir -p data
          if curl -s -f "https://turiiko.shop/actions/KANTO/load.php" -o data/KANTO_load.json; then
            echo "FETCHED=true" >> $GITHUB_OUTPUT
          else
            echo "FETCHED=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Commit result
        id: commit_result
        if: steps.fetch_api.outputs.FETCHED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 1. 変更があるか「インデックスに追加する前」にチェック
          git add data/KANTO_load.json
          
          if git diff --cached --quiet; then
            echo "CHANGES=false" >> $GITHUB_OUTPUT
            echo "No changes"
          else
            # 2. 変更があった場合、一度未ステージ状態の変更を一時退避させる
            git stash
            
            # 3. リモートの最新状態を取り込む
            git pull --rebase origin main
            
            # 4. 退避させた変更を戻して、改めてコミット・プッシュする
            git stash pop
            git add data/KANTO_load.json
            git commit -m "test: update kanto load"
            git push origin main
            echo "CHANGES=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger KANTO Whether Control
        if: steps.commit_result.outputs.CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'KANTO_whether.yml',
              ref: 'main'
            })
