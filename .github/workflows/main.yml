name: KANTO Load CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # 1日1回のみ実行（JST 01:00 相当）

# Gitへの書き込み権限と、Pagesへの直接デプロイ権限を設定
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch API
        id: fetch_api
        run: |
          mkdir -p data
          if curl -s -f "https://turiiko.shop/actions/KANTO/load.php" -o data/KANTO_load.json; then
            echo "FETCHED=true" >> $GITHUB_OUTPUT
          else
            echo "FETCHED=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Commit result
        id: commit_result
        if: steps.fetch_api.outputs.FETCHED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # 1. ダウンロードした新データを一度退避（衝突防止）
          git stash --include-untracked
          
          # 2. 最新のリモート状態を同期
          git pull --rebase origin main
          
          # 3. 退避したデータを手元に復元
          git stash pop || true
          
          # 4. 変更チェックとコミット
          git add data/KANTO_load.json
          
          if git diff --cached --quiet; then
            echo "CHANGES=false" >> $GITHUB_OUTPUT
            echo "No changes"
          else
            git commit -m "test: update kanto load"
            git push origin main
            echo "CHANGES=true" >> $GITHUB_OUTPUT
          fi

      # ========================================================
      # GitHub Pages への直接デプロイ（新設！）
      # ========================================================
      - name: Upload Artifact
        if: steps.commit_result.outputs.CHANGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './' # 更新された KANTO_load.json を含む全体を公開

      - name: Deploy to GitHub Pages
        if: steps.commit_result.outputs.CHANGES == 'true'
        uses: actions/deploy-pages@v4

      # ========================================================
      # 次のワークフローへの連鎖トリガー
      # ========================================================
      - name: Trigger KANTO Whether Control
        if: steps.commit_result.outputs.CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'KANTO_whether.yml',
              ref: 'main'
            })
