name: Recalculate InLand Weather Data

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日 02:00 JST
  workflow_dispatch:

# Gitへの書き込み権限と、Pagesへの直接デプロイ権限を設定
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  recalculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ここを24にし、cache: 'npm' を完全に削除しました

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: Run recalculation script
        run: node js/recalcInLand.js
        env:
          TZ: 'Asia/Tokyo' # 日付判定を日本時間に合わせるため必須

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/
          
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto: [KANTO] 内陸補間データの再計算を反映"
            git push origin main
          else
            echo "✅ 変更がない（またはスキップされた）ため、コミットしませんでした。"
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
