name: Recalculate InLand Weather Data

on:
  workflow_dispatch:

jobs:
  recalculate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # ※前回のタイポ(checkoutになっていた点)も併せて修正しました
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ======= ★ここを修正しました★ =======
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json が見つかったため npm ci を実行します。"
            npm ci
          elif [ -f package.json ]; then
            echo "package.json のみ見つかったため npm install を実行します。"
            npm install
          else
            echo "package.json が存在しないため axios を個別インストールします。"
            npm install axios
          fi
      # ====================================

      - name: Run recalculation script
        run: node js/recalcInLand.js
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto: [KANTO] 内陸補間データの再計算を反映"
            git push origin main
          else
            echo "No changes to commit"
          fi
