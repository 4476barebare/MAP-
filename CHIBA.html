<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣り行こCHIBA</title>

<!-- 既存そのまま -->
<link rel="stylesheet" href="/MAP-/header.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ★ここから下だけが今回の追加（他は触らない） */

/* 地図エリア */
#lf-map{
  width:100%;
  height:60vh;
  position:relative;
}

/* Leaflet描画 */
#map-inner{
  width:100%;
  height:100%;
}

/* UIレイヤー（完全分離） */
#ui-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* UIだけ操作可能にする */
.ui{
  pointer-events:auto;
}

/* 中央ターゲット */
#center-target{
  position:absolute;
  top:50%;
  left:50%;
  width:14px;
  height:14px;
  transform:translate(-50%,-50%);
}

#center-target::before,
#center-target::after{
  content:"";
  position:absolute;
  background:red;
}

#center-target::before{
  left:50%;
  width:1px;
  height:100%;
  transform:translateX(-50%);
}

#center-target::after{
  top:50%;
  width:100%;
  height:1px;
  transform:translateY(-50%);
}

/* メニュー */
#map-menu{
  position:absolute;
  bottom:10px;
  left:8px;
  right:8px;

  background:#fff;
  border:1px solid #191970;
  border-radius:8px;

  padding:4px 8px;
}

/* リスト */
#map-menu ul{
  margin:0;
  padding:0;
  list-style:none;
}

#map-menu li{
  display:flex;
  justify-content:space-between;
  align-items:center;

  font-size:13px;
  line-height:1.2;
  padding:4px 0;

  border-bottom:1px dotted #191970;
  cursor:pointer;
}

#map-menu li:last-child{
  border-bottom:none;
}

/* ページ送り */
.nav-btn{
  font-size:11px;
  color:#007aff;
  margin-left:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- ★ここは既存そのまま -->
<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list">
            <li>新潟</li>
            <li>群馬</li>
            <li>飯岡漁港(千葉)</li>
          </ul>
        </div>
      </div>
      <a href="#">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>

<!-- 地図エリア -->
<div id="lf-map">

  <!-- Leaflet本体 -->
  <div id="map-inner"></div>

  <!-- UIレイヤー -->
  <div id="ui-layer">

    <div id="center-target"></div>

    <div id="map-menu" class="ui">
      <ul></ul>
    </div>

  </div>

</div>

<!-- ★既存そのまま -->
<footer>
  © 釣り行こNAVI
</footer>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function(){

  // ===== 地図 =====
  const map = L.map('map-inner').setView([35.15,140.3],8);

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  // ===== メニュー =====
  const menu = document.querySelector('#map-menu ul');

  const points = [
    {name:'ポイント1', lat:35.15, lng:140.3},
    {name:'ポイント2', lat:35.2, lng:140.35},
    {name:'ポイント3', lat:35.25, lng:140.4},
    {name:'ポイント4', lat:35.3, lng:140.45},
    {name:'ポイント5', lat:35.35, lng:140.5},
    {name:'ポイント6', lat:35.4, lng:140.55}
  ];

  let page = 0;
  const max = 4;

  function render(){
    menu.innerHTML = '';

    const start = page * max;
    const end = Math.min(start + max, points.length);

    for(let i = start; i < end; i++){

      const li = document.createElement('li');

      const text = document.createElement('span');
      text.textContent = points[i].name;
      li.appendChild(text);

      // 次ページ
      if(i === end - 1 && end < points.length){
        const next = document.createElement('span');
        next.textContent = '▶';
        next.className = 'nav-btn';
        next.onclick = (e)=>{
          e.stopPropagation();
          page++;
          render();
        };
        li.appendChild(next);
      }

      // 前ページ
      if(i === start && page > 0){
        const prev = document.createElement('span');
        prev.textContent = '◀';
        prev.className = 'nav-btn';
        prev.onclick = (e)=>{
          e.stopPropagation();
          page--;
          render();
        };
        li.appendChild(prev);
      }

      // 地図移動
      li.onclick = ()=>{
        map.setView([points[i].lat, points[i].lng], 12);
      };

      menu.appendChild(li);
    }
  }

  render();

});
</script>

</body>
</html>
