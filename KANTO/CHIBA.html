<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0; padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff; overflow-x:hidden;
}

li, button {
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}

li:active,
button:active {
  background: transparent;
}

li {
  user-select: none;
  cursor: pointer;
}

.leaflet-control-attribution {
  font-size: 8px;
  background: rgba(255,255,255,0.5);
}

/* 地図 */
#lf-map { width:100%; height:80vh; position:relative; z-index:0; }
.leaflet-container { z-index:0; }


.map-menu {
  position: absolute;
  bottom: 5px;
  left: 5px;
  right: 5px;
  max-height: 200px;
  background: #fff;
  border-radius: 3px;
  overflow-y: auto;
  z-index: 1980;
  padding: 2px 5px;
  pointer-events: auto; /* メニュー全体有効 */
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

#map-menu, #map-menu ul, #map-menu li, #map-menu button {
  pointer-events: auto; /* 子要素も確実に有効化 */
}

.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #191970;
  padding: 4px 8px;
  width: 100%;        /* 幅いっぱい */
  box-sizing: border-box;
  cursor: pointer;
  border-bottom: 1px dotted #191970;
}

.map-menu li:last-child {
  border-bottom: none;
  padding-bottom: 3px;
}

#map-menu button {
    width: 100%;
  background: transparent;
  border: none;
  color: inherit;
  cursor: pointer;
  padding: 0;
  font-size: inherit;
  text-align: left;
}


.map-ad {
  position: absolute;
  top: 12px;
   left: 5px;     /* ←左寄せの本体 */
  z-index: 1500;

  pointer-events: none; /* ←超重要 */
}

.map-ad .ad-box {
  width: 320px;
  height: 50px;
  background: rgba(255,255,255,0.9);
  border: 1px solid #ccc;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 12px;
  color: #333;

  pointer-events: auto; /* ←広告だけクリック可 */
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
border-radius: 4px;
}

/* 天気UI */

#weather-wave-tide-container {
  display: none;
  border-top:1px solid #191970;
}

.weather-header {
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding-left:2px;
  padding-bottom: 0px;
  margin-bottom: -2px;
}

.weather-container, #weather-wave-tide-container {
  width:100%; display:flex; flex-direction:column;
  color: #191970;
  font-family:monospace;
  font-size:10px;
  text-align:center;
  margin-top:0px;
  margin-bottom: -3px;
}

.weather-block {
  flex:1;
  text-align:center;
  font-size:10px;
  line-height:1.1;
  padding:1px 0;
  margin-right:1px;
}

.weather-block.first-block {
    flex:0 0 30px;
}

/* 潮名縦書き */
.tide-label {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display:flex;
  align-items:center;
  justify-content:center;
}

.weather-row {
    display:flex;
    justify-content:space-between;
    }

.spot-wrap {
  background: transparent;
  border: none;
}

.spot-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 120px;
}

/* 1行目：アイコン＋テキスト */
.spot-main {
    color: white;
  display: flex;
  align-items: center;     /* ←ここ重要（2行ズレ防止） */
  justify-content: center;
  gap: 4px;

  background: #191970;

  padding: 4px 6px;
  border-radius: 3px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);

  max-width: 120px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* アイコン */
.spot-main img {
    filter: brightness(0) invert(1);
  width: 18px;
  height: 18px;
  margin-top: 0; /* 文字との高さ合わせ */
}

/* テキスト折り返し */
.spot-main span {
 display: block;
  text-align: center;

  font-size: 12px;
  line-height: 1.2;

  word-break: break-word;
  overflow-wrap: break-word;

  /* 2行制限 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  
}

/* ▼ */
.spot-arrow {
  color: #191970;
  font-size: 14px;
  line-height: 10px;

  text-align: center;

  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
}




</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>



<div id="lf-map">
    
  
    <!-- 広告（重ねる） -->
  <div class="map-ad">
    <div class="ad-box">AD 320×50</div>
  </div>
  
  <div id="map-menu" class="map-menu"><ul></ul></div>

  <!-- 戻るボタン -->
  <button id="map-back-btn" style="
    position:absolute;
    bottom:50px; /* 著作権表記の上に調整 */
    right:10px;
    display:none;
    z-index:2000;
    background:#fff;
    border:1px solid #888;
    border-radius:4px;
    padding:4px 6px;
    font-size:12px;
    cursor:pointer;
  ">← 戻る</button>
</div>

<div id="weather-wave-tide-container"></div>



<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<footer>© 釣り行こNAVI</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script src="/MAP-/js/dataLoader.js"></script>


<script>
document.addEventListener('DOMContentLoaded', () => {

    const csvUrl = '/MAP-/data/location.csv';
    const pathParts = location.pathname.split('/');
    const currentFile = pathParts[pathParts.length - 1];

    // CSV読み込み
    loadLocationCSV(csvUrl, currentFile).then(data => {

        if (!data.main) {
            console.error('県本体データがありません');
            alert('県本体データがありません');
            return;
        }
        window.prefData = data.main;

        // 地図描画（航空写真、全操作禁止）
        window.map = L.map('lf-map', {
            center:[window.prefData.lat, window.prefData.lng],
            zoom:window.prefData.zoom,
            scrollWheelZoom:false,
            doubleClickZoom:false,
            dragging:false,
            zoomControl:false
        });
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg', {
            attribution:'© 国土地理院'
        }).addTo(window.map);

        // エリア中心座標リスト
        const areaCenters = data.areas.map(a => ({ name:a.name, lat:a.lat, lng:a.lng, zoom:a.zoom }));

        // --- 共通関数：エリア選択 ---
        function selectArea(areaName) {
            const area = areaCenters.find(a => a.name === areaName);
            if (!area) return;

            // 地図移動
            drawLocation(area.name, area.lat, area.lng, area.zoom || window.prefData.zoom);

            // ハッシュ更新
            location.hash = encodeURIComponent(area.name);

            // 必要に応じてUI更新など
            console.log(`選択されたエリア: ${area.name}`);
        }

        // --- 初期ハッシュチェック＋描画 ---
        let initialHash = location.hash || '';
        if (initialHash) {
            const parts = decodeURIComponent(initialHash.substring(1)).split('/');
            const areaName = parts[0];
            const spotName = parts[1];

            if (spotName) {
                handleSpotInitial(spotName, areaName);
            } else {
                selectArea(areaName);
            }
        } else {
            // ハッシュなし → 県本体表示
            drawLocation(
                window.prefData.name,
                window.prefData.lat,
                window.prefData.lng,
                window.prefData.zoom,
                window.prefData.maxZoom,
                'photo'
            );
        }

        // --- 地図クリックで最寄りエリア判定 ---
        window.map.on('click', (e) => {
            const menuRect = document.getElementById('map-menu').getBoundingClientRect();
            if (e.originalEvent.clientX >= menuRect.left &&
                e.originalEvent.clientX <= menuRect.right &&
                e.originalEvent.clientY >= menuRect.top &&
                e.originalEvent.clientY <= menuRect.bottom) {
                return; // メニュー上クリックは無視
            }

            const clickLat = e.latlng.lat;
            const clickLng = e.latlng.lng;

            let minDist = Infinity;
            let nearestArea = null;

            areaCenters.forEach(area => {
                const dLat = clickLat - area.lat;
                const dLng = clickLng - area.lng;
                const dist = dLat*dLat + dLng*dLng;
                if (dist < minDist) {
                    minDist = dist;
                    nearestArea = area.name;
                }
            });

            if (nearestArea) selectArea(nearestArea);
        });

        // --- メニュー生成 ---
        const menuUl = document.querySelector('#map-menu ul');
        menuUl.innerHTML = '';
        areaCenters.forEach(area => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.textContent = area.name;
            btn.onclick = () => selectArea(area.name);
            li.appendChild(btn);
            menuUl.appendChild(li);
        });

        // --- 完了アラート ---
        const areaNames = areaCenters.map(a => a.name).join(', ');
        alert(`県名: ${window.prefData.name}\nエリア: ${areaNames}`);

    }).catch(err => {
        console.error('CSV読み込みエラー:', err);
        alert('CSV読み込みに失敗しました');
    });

});
</script>


</html>
