<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<!-- ヘッダーCSS -->
<link rel="stylesheet" href="/MAP-/header.css">

<!-- Leaflet CSS -->
<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

/* 地図（背景だけ削除） */
#lf-map {
  width: 100%;
  height: 70vh;
}

/* Leafletを背面へ */
.leaflet-container {
  z-index: 0;
}
</style>
</head>

<body>

<!-- ヘッダー -->
<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<!-- 地図 -->
<div id="lf-map"></div>

<!-- フッター -->
<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- デバッグ表示（追加） -->
<div id="map-debug" style="
position:fixed;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:8px;
font-size:12px;
z-index:9999;
border-radius:6px;
">
  lat: <span id="lat">-</span><br>
  lng: <span id="lng">-</span><br>
  zoom: <span id="zoom">-</span>
</div>

<!-- JS（順番重要） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- header.js（そのまま） -->
<script src="/MAP-/header.js" defer></script>

<!-- 地図 -->
<script>
window.addEventListener('DOMContentLoaded', function() {

  const map = L.map('lf-map').setView([35.5, 140.25], 9); // ←ズームだけ変更

  map.attributionControl.setPrefix(false); // ←ロゴ削除

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // デバッグ表示
  function updateDebug() {
    const center = map.getCenter();
    document.getElementById('lat').textContent = center.lat.toFixed(5);
    document.getElementById('lng').textContent = center.lng.toFixed(5);
    document.getElementById('zoom').textContent = map.getZoom();
  }

  map.on('move', updateDebug);
  map.on('zoom', updateDebug);
  updateDebug();

});
</script>

</body>
</html>
