<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<!-- ヘッダーCSS -->
<link rel="stylesheet" href="/MAP-/header.css">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

/* 地図 */
#lf-map {
  width: 100%;
  height: 60vh;
  position: relative;
}

/* Leaflet背面 */
.leaflet-container {
  z-index: 0;
}

/* メニュー共通 */
.map-menu {
  position: absolute;
  bottom: 5px; 
  left: 5px;
  right: 5px;
  background: rgba(255,255,255,0.95);
  padding: 6px 10px;
  box-shadow: 0 0 4px rgba(0,0,0,0.3);
  border-radius: 6px;
  z-index: 500;
  max-height: 120px; /* 3〜4行 */
  overflow: hidden;   /* スクロールバー非表示 */
}

.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  padding: 2px 0;
  cursor: pointer;
}

.map-menu li.next-page,
.map-menu li.prev-page {
  font-weight: bold;
  text-align: right;
}
</style>
</head>

<body>

<!-- ヘッダー -->
<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>

<!-- 地図 -->
<div id="lf-map"></div>

<!-- メニューその1 -->
<div id="map-menu1" class="map-menu">
  <ul>
    <li data-lat="35.15" data-lng="140.3">ポイント1</li>
    <li data-lat="35.2" data-lng="140.35">ポイント2</li>
    <li data-lat="35.25" data-lng="140.4">ポイント3</li>
    <li data-lat="35.3" data-lng="140.45">ポイント4</li>
    <li class="next-page">▶ 次へ</li>
  </ul>
</div>

<!-- メニューその2 -->
<div id="map-menu2" class="map-menu" style="display:none;">
  <ul>
    <li data-lat="35.5" data-lng="140.5">サブポイント1</li>
    <li data-lat="35.55" data-lng="140.55">サブポイント2</li>
    <li class="prev-page">◀ 戻る</li>
  </ul>
</div>

<!-- フッター -->
<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- JS（順番重要） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function() {

  // 地図初期化
  const map = L.map('lf-map').setView([35.15, 140.3], 8);
  map.attributionControl.setPrefix(false); // Leafletロゴ削除

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // --- メニューその1クリック ---
  document.querySelectorAll('#map-menu1 li[data-lat]').forEach(li => {
    li.addEventListener('click', function() {
      const lat = parseFloat(this.dataset.lat);
      const lng = parseFloat(this.dataset.lng);
      map.setView([lat, lng], 12);
      document.getElementById('map-menu1').style.display = 'none';
      document.getElementById('map-menu2').style.display = 'block';
    });
  });

  // 次ページ
  document.querySelector('#map-menu1 .next-page').addEventListener('click', function() {
    document.getElementById('map-menu1').style.display = 'none';
    document.getElementById('map-menu2').style.display = 'block';
  });

  // --- メニューその2クリック ---
  document.querySelectorAll('#map-menu2 li[data-lat]').forEach(li => {
    li.addEventListener('click', function() {
      const lat = parseFloat(this.dataset.lat);
      const lng = parseFloat(this.dataset.lng);
      map.setView([lat, lng], 12);
      document.getElementById('map-menu2').style.display = 'none';
    });
  });

  // 戻る
  document.querySelector('#map-menu2 .prev-page').addEventListener('click', function() {
    document.getElementById('map-menu2').style.display = 'none';
    document.getElementById('map-menu1').style.display = 'block';
  });

});
</script>

</body>
</html>
