<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0; padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff; overflow-x:hidden;
}

li, button {
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}

li:active,
button:active {
  background: transparent;
}

li {
  user-select: none;
  cursor: pointer;
}

/* 地図 */
#lf-map { width:100%; height:80vh; position:relative; z-index:0; }
.leaflet-container { z-index:0; }


.map-menu {
  position: absolute;  /* 地図コンテナに対して絶対配置 */
  bottom: 0;           /* 下揃え */
  left: 5px;
  right: 5px;
  min-height: 50px;    /* 必要に応じて高さを調整 */
  background: rgba(255,255,255,0.9);
  border-top: 1px solid #191970;
  border-bottom: 1px solid #191970;
  padding: 4px 8px;
  z-index: 2000;       /* Leaflet タイルより上に表示 */
  overflow: auto;
}
/* 天気UI */

#weather-wave-tide-container {
  display: none;
  border-top:1px solid #191970;
}

.weather-header {
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding-left:2px;
  padding-bottom: 0px;
  margin-bottom: -2px;
}

.weather-container, #weather-wave-tide-container {
  width:100%; display:flex; flex-direction:column;
  color: #191970;
  font-family:monospace;
  font-size:10px;
  text-align:center;
  margin-top:0px;
  margin-bottom: -3px;
}

.weather-block {
  flex:1;
  text-align:center;
  font-size:10px;
  line-height:1.1;
  padding:1px 0;
  margin-right:1px;
}

.weather-block.first-block {
    flex:0 0 30px;
}

/* 潮名縦書き */
.tide-label {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display:flex;
  align-items:center;
  justify-content:center;
}

.weather-row {
    display:flex;
    justify-content:space-between;
    }

.spot-wrap {
  background: transparent;
  border: none;
}

.spot-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 120px;
}

/* 1行目：アイコン＋テキスト */
.spot-main {
    color: white;
  display: flex;
  align-items: center;     /* ←ここ重要（2行ズレ防止） */
  justify-content: center;
  gap: 4px;

  background: #191970;

  padding: 4px 6px;
  border-radius: 3px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);

  max-width: 120px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* アイコン */
.spot-main img {
    filter: brightness(0) invert(1);
  width: 18px;
  height: 18px;
  margin-top: 0; /* 文字との高さ合わせ */
}

/* テキスト折り返し */
.spot-main span {
 display: block;
  text-align: center;

  font-size: 12px;
  line-height: 1.2;

  word-break: break-word;
  overflow-wrap: break-word;

  /* 2行制限 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  
}

/* ▼ */
.spot-arrow {
  color: #191970;
  font-size: 14px;
  line-height: 10px;

  text-align: center;

  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
}




</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>



<div id="lf-map">
  <div id="center-target"></div>
  <div id="map-menu" class="map-menu"><ul></ul></div>

  <!-- 戻るボタン -->
  <button id="map-back-btn" style="
    position:absolute;
    bottom:50px; /* 著作権表記の上に調整 */
    right:10px;
    display:none;
    z-index:2000;
    background:#fff;
    border:1px solid #888;
    border-radius:4px;
    padding:4px 6px;
    font-size:12px;
    cursor:pointer;
  ">← 戻る</button>
</div>

<div id="weather-wave-tide-container"></div>



<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<footer>© 釣り行こNAVI</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script src="/MAP-/js/dataLoader.js"></script>


<script>
document.addEventListener('DOMContentLoaded', () => {
    const pathParts = location.pathname.split('/');
    const currentFile = pathParts[pathParts.length - 1];
    const csvUrl = '/MAP-/data/location.csv';

    // ハッシュチェック + 描画 + メニュー生成
    function initMapWithMenu() {
        // ハッシュがある場合は何もしない
        if (location.hash && location.hash !== '') {
            console.log('ハッシュあり → 描画・メニュー生成スキップ');
            return;
        }

        loadLocationCSV(csvUrl, currentFile).then(data => {
            const prefData = data.main;
            if (!prefData) {
                alert('県本体データがありません');
                return;
            }

            // 座標とズームで航空写真描画
            drawLocation(
                prefData.name,
                prefData.lat,
                prefData.lng,
                prefData.zoom,
                prefData.maxZoom,
                'photo' // 航空写真
            );

            // 読み込んだ県名とエリア名をアラート
            const areaNames = data.areas.map(a => a.name).join(', ');
            alert(`県名: ${prefData.name}\nエリア: ${areaNames}`);

            // メニュー生成
            createMapMenuFromAreas(data.areas);
        }).catch(err => {
            console.error('CSV読み込みエラー:', err);
            alert('CSV読み込みに失敗しました');
        });
    }

    function createMapMenuFromAreas(areas) {
        const map = document.getElementById('lf-map');
        if (!map) return;

        let menu = document.getElementById('map-menu');
        if (!menu) {
            menu = document.createElement('div');
            menu.id = 'map-menu';
            menu.className = 'map-menu';
            menu.innerHTML = '<ul></ul>';
            map.appendChild(menu);
        }

        const ul = menu.querySelector('ul');
        ul.innerHTML = '';

        areas.forEach(area => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.textContent = area.name;
            btn.onclick = () => alert(`クリックされたエリア: ${area.name}`);
            li.appendChild(btn);
            ul.appendChild(li);
        });
    }

    // 実行
    initMapWithMenu();

    // グローバル化して必要なら他でも呼べる
    //window.createMapMenuFromAreas = createMapMenuFromAreas;

});



</script>

</html>
