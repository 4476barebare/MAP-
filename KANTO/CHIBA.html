<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; background:#fff; overflow-x:hidden; }
li, button { -webkit-tap-highlight-color: rgba(0,0,0,0); }
li:active, button:active { background: transparent; }
li { user-select: none; cursor: pointer; }
.leaflet-control-attribution { font-size: 8px; background: rgba(255,255,255,0.5); }
#lf-map {
    width:100%;
    height:80vh;
    position:relative; 
    z-index:0;
    touch-action: none;
    }
.leaflet-container { z-index:0; }

/* メニューは初期非表示 */
.map-menu {
    display:none;
    position: absolute;
    bottom: 5px;
    left: 5px;
    right: 5px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 1980;
    padding: 2px 5px;
    pointer-events: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
#map-menu, #map-menu ul, #map-menu li, #map-menu button { pointer-events: auto; }
.map-menu ul {
    list-style: none;
    margin: 0;
    padding: 0;
    background: none; /* ← 消す */
}

.map-menu li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #fff;
    padding: 4px 8px;
    width: 100%;
    box-sizing: border-box;
    cursor: pointer;

    /* ↓ 追加 */
    background-color: rgba(0,0,0,0.5);
    border-radius: 6px;
    margin: 2px 0; /* 行ごとの間隔 */
}
.map-menu li:last-child {
    border-bottom: none;
    padding-bottom: 3px;
}
#map-menu button { width: 100%; background: transparent; border: none; color: inherit; cursor: pointer; padding: 0; font-size: inherit; text-align: left; }
.map-ad { position: absolute;
top: 12px;
left: 50%;
    transform: translateX(-50%);
z-index: 1500;
pointer-events: none;}
.map-ad .ad-box { width: 320px; height: 50px; background: rgba(255,255,255,0.9); border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #333; pointer-events: auto; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border-radius: 4px; }


.map-back-btn {
    position: absolute;
    bottom: 40px;
    right: 20px;
    z-index: 2000;
    background: none;
    border: none;
    padding: 0;

    -webkit-appearance: none;
    appearance: none;
}
.back-icon {
    width:36px;
    height:36px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    
    /* 右側に行くほど透明 */
    -webkit-mask-image: linear-gradient(to right, black 60%, transparent);
    mask-image: linear-gradient(to right, black 60%, transparent);
}


.spot-label {
  display: inline-flex;           /* ← flexに統一 */
  align-items: center;
  gap: 3px;

  padding: 1px 4px;
  font-size: 10px;
  font-weight: bold;
  white-space: nowrap;

  border-radius: 3px;
  background: #191970;
  color: #fff;

  /* 軽量化 */
  border: none;
  box-shadow: none;
}

.spot-label svg {
  width: 12px;
  height: 12px;
  fill: currentColor; /* ←重要：色同期 */
}



/* デフォ */
.spot-label.spot {
  background: #191970;
}

/* fish系 */
.spot-label.fish1 { background: #6495ED; }
.spot-label.fish2 { background: #2E8B57; }
.spot-label.fish3 { background: #FF8C00; }
.spot-label.fish4 { background: #4B0082; }
.spot-label.fish6 { background: #008000; }

.pref-dot {
    width:5px;
    height:5px;
}



/* 旧スポット */
.pref-dot.spot {
    background:#191970;
}

/* fish系（自由に色分け） */
.pref-dot.fish1 { background:#6495ED; }
.pref-dot.fish2 { background:#2E8B57; }
.pref-dot.fish3 { background:#FF8C00; }
.pref-dot.fish4 { background:#4B0082; }
.pref-dot.fish6 { background:#008000; }

.shop-marker {
    display:flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border:2px solid #191970;
    border-radius:50%;
    background:#fff;
    font-size:12px;
    color:#191970;
    box-sizing:border-box;
}

.shop-marker.no-circle {
    border: 0;
    background: none;
}

.shop-marker.no-circle .shop-icon {
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
}


.shop-icon {
    width:14px;
    height:14px;
    fill:#191970;
    pointer-events:none;
}

.shop-popup {
    font-size:13px;
    line-height:1.4;
}

.shop-popup-title {
    font-weight:bold;
    margin-bottom:4px;
    padding-right: 20px;
}

.shop-popup-address {
    font-size:12px;
    color:#555;
    margin-bottom:6px;
}

/* ▼ 追加 */
.shop-popup-footer {
    display:flex;
    justify-content:flex-end;
    margin-top:4px;
}

.shop-popup-btn {
    display:inline-block;
    padding:4px 8px;
    font-size:12px;
    border-radius:4px;
    color:#555;
    text-decoration:none;
}


.leaflet-popup-content-wrapper {
    padding: 4px;
}

.leaflet-popup-content {
    margin-top: 10px;
    margin: 4px 6px;
}

.leaflet-popup-tip,
.leaflet-popup-tip-container {
    display: none;
}

.shop-popup-address.dummy {
font-size:12px;
    color:#555;
    margin-bottom:6px;
    padding-right: 20px;
}

/* ボタンの変な記号を完全削除 */
.shop-popup-btn::after {
    content: none !important;
}

.close-btn {
  position: absolute;
  top: 8px;
  right: 10px;

  z-index: 10000;

  background: rgba(0,0,0,0.6);
  color: #fff;

  border: none;
  border-radius: 50%;

  width: 28px;
  height: 28px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  cursor: pointer;
}



</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#" id="calendarBtn">カレンダー</a>
    </nav>
  </div>
</header>


<div id="lf-map">
  <div class="map-ad">
    <div class="ad-box">AD 320×50</div>
  </div>
  <div id="map-menu" class="map-menu"><ul></ul></div>
  <button id="map-back-btn" class="map-back-btn"></button>
</div>


<div id="weather-wave-tide-container"></div>
<div id="newsOverlay"><div class="news-window"><button id="closeNews">閉じる</button><div class="news-content"></div></div></div>
<a id="calendarBtn">カレンダー</a>

<div id="calendarOverlay" class="overlay">
  <div class="overlay-content">
    <button id="closeCalendar" class="close-btn">×</button>
    <div id="calendarWrapper"></div>
  </div>
</div>


<footer>© 釣り行こNAVI</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>
<script src="/MAP-/js/markerControl.js"></script>
<script src="/MAP-/js/dataLoader.js"></script>


<script>

// =======================
// グローバル
// =======================
window.prefData = null;
window.areaData = [];
window.spotData = [];
window.currentHash = '';
window.currentAreaId = null;
window.currentSpotId = null;
window.currentPref = null;
window.nearestClickEnabled = true;
window.nearestClickHandler = null;

// =======================
// デバッグ
// =======================
function showDebug(msg) {
    let debugEl = document.getElementById('debug');

    if (!debugEl) {
        debugEl = document.createElement('div');
        debugEl.id = 'debug';
        debugEl.style.position = 'fixed';
        debugEl.style.top = '0';
        debugEl.style.left = '0';
        debugEl.style.background = 'rgba(255,255,0,0.85)';
        debugEl.style.zIndex = '9999';
        debugEl.style.padding = '6px';
        debugEl.style.fontSize = '12px';
        debugEl.style.maxWidth = '320px';
        debugEl.style.whiteSpace = 'pre-wrap';
        debugEl.style.maxHeight = '40vh';
        debugEl.style.overflow = 'auto';
        document.body.appendChild(debugEl);
    }

    debugEl.textContent += msg + "\n";
}

// =======================
// PREF / AREA UI
// =======================
function initAreaUI() {
    document.getElementById('map-menu').style.display = 'block';

    const menuUl = document.querySelector('#map-menu ul');
    if (!menuUl) {
    document.body.innerHTML += "<div style='color:red'>MENU UL NULL</div>";
    return;
}

    menuUl.innerHTML = '';

    window.areaData.forEach(area => {

        const li = document.createElement('li');
        const btn = document.createElement('button');

        const areaName = (area.name || '').trim();
        btn.textContent = areaName;

       btn.onclick = () => {
    location.hash = encodeURIComponent(areaName);
    updateStateFromHash();
    destroyAreaUI();
    selectArea(areaName);

};

        li.appendChild(btn);
        menuUl.appendChild(li);
    });

    // nearest click
    window.nearestClickHandler = function(e) {

        if (!window.nearestClickEnabled) return;

        const menuRect = document.getElementById('map-menu').getBoundingClientRect();

        if (
            e.originalEvent.clientX >= menuRect.left &&
            e.originalEvent.clientX <= menuRect.right &&
            e.originalEvent.clientY >= menuRect.top &&
            e.originalEvent.clientY <= menuRect.bottom
        ) return;

        let nearestArea = null;
        let minDist = Infinity;

        window.areaData.forEach(area => {

            const dLat = e.latlng.lat - area.lat;
            const dLng = e.latlng.lng - area.lng;
            const dist = dLat * dLat + dLng * dLng;

            if (dist < minDist) {
                minDist = dist;
                nearestArea = area.name;
            }
        });

        if (nearestArea) {
    location.hash = encodeURIComponent(nearestArea);
    updateStateFromHash();
    destroyAreaUI();
    selectArea(nearestArea);
    
}
    };

    window.nearestClickEnabled = true;
    window.map.on('click', window.nearestClickHandler);
}

// =======================
// UI解除
// =======================
function destroyAreaUI() {

    const menuUl = document.querySelector('#map-menu ul');
    if (menuUl) menuUl.innerHTML = '';

    if (window.nearestClickHandler) {
        window.map.off('click', window.nearestClickHandler);
        window.nearestClickHandler = null;
    }

    window.nearestClickEnabled = false;
   document.getElementById('map-menu').style.display = 'none';
}

// =======================
// ROUTE UPDATE（唯一起点）
// =======================
function routeUpdate() {

    if (!window.prefData) return;

    // -----------------------
    // SPOT
    // -----------------------
    if (window.currentSpotId) {

        const spot = window.spotData.find(s =>
            (s.individualId || s.id) === window.currentSpotId.split('_').pop()
        );

        const area = window.areaData.find(a =>
            window.currentAreaId && window.currentAreaId.endsWith(a.individualId)
        );

        if (!spot || !area) return;

        drawLocation(spot.name, spot.lat, spot.lng, spot.zoom || 15);

        selectArea(area.name);
        selectSpot(area.name, spot.name, spot.lat, spot.lng);

        return;
    }

    // -----------------------
    // AREA
    // -----------------------
    if (window.currentAreaId) {

        const area = window.areaData.find(a =>
            window.currentAreaId.endsWith(a.individualId)
        );

        if (!area) return;

        drawLocation(
            area.name,
            area.lat,
            area.lng,
            area.zoom || window.prefData.zoom
        );

        selectArea(area.name);

        return;
    }

    // -----------------------
    // PREF
    // -----------------------
    if (!window.currentAreaId && !window.currentSpotId) {

        drawLocation(
            window.prefData.name,
            window.prefData.lat,
            window.prefData.lng,
            window.prefData.zoom
        );

        document.getElementById('map-back-btn').style.display = 'none';
        //document.getElementById('map-back-btn').style.display = 'block';
        initAreaUI(); // ← PREFだけUI起動

        return;
    }
}

// =======================
// DOM INIT
// =======================
document.addEventListener('DOMContentLoaded', () => {

    const currentFile = location.pathname.split('/').pop().split('?')[0].split('#')[0];
    const pref = currentFile.replace('.html', '').toUpperCase();

    const csvUrl = `/MAP-/KANTO/${pref}_location.csv`;
    const shopUrl = `/MAP-/KANTO/${pref}_shop.csv`;

    window.currentPref = pref;

    loadLocationCSV(csvUrl, currentFile).then(() => {

        updateStateFromHash();

        routeUpdate();
        
        window.markerControl.preloadShop01(shopUrl);

    });

    const btn = document.getElementById('map-back-btn');

btn.addEventListener('click', () => {
    goBack(window.currentHash);
});

// -----------------------
    // back SVG
    // -----------------------
    fetch('/MAP-/icon/back.svg')
        .then(res => res.text())
        .then(svg => {

            const btn = document.getElementById('map-back-btn');
            btn.innerHTML = svg;

            const svgEl = btn.querySelector('svg');
            if (svgEl) svgEl.classList.add('back-icon');
        });


// =======================
// ズームガード
// =======================

function startZoomGuard() {
    if (!window.map) return;

    window._zoomGuardBase = window.map.getZoom();
    window._zoomGuardActive = true;
}

function isZoomGuardFailed(threshold = 0.3) {
    if (!window._zoomGuardActive || !window.map) {
        return false;
    }

    const currentZoom = window.map.getZoom();
    const diff = currentZoom - window._zoomGuardBase;
    const failed = diff > threshold;



    return failed;
}

function stopZoomGuard() {
   // showDebug("ZG STOP");

    window._zoomGuardActive = false;
    window._zoomGuardBase = null;
}


// =======================
// ピンチイン検知（documentベース）
// =======================

let pinchStartDistance = 0;
let pinchTriggered = false;

function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

document.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        pinchStartDistance = getDistance(e.touches);
        pinchTriggered = false;
    }
}, { passive: false });


document.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {

        e.preventDefault(); // チラつき防止

        const currentDistance = getDistance(e.touches);

        // ピンチイン検知
        if (!pinchTriggered && currentDistance < pinchStartDistance - 20) {

            pinchTriggered = true;

            const isPrefView = !window.currentAreaId && !window.currentSpotId;

            // -----------------------
            // ズームガード
            // -----------------------
            if (isZoomGuardFailed()) return;

            // -----------------------
            // 戻る処理
            // -----------------------
            if (!isPrefView) {
                goBack(window.currentHash);
            }
        }
    }
}, { passive: false });


document.addEventListener('touchend', () => {
    pinchStartDistance = 0;
    pinchTriggered = false;
});








});




</script>
</body>
</html>
