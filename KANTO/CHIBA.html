<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

/* ヘッダー */
header {
  background: #fff;
  border-bottom: 1px solid #ccc;
  padding: 10px;
}

/* 地図 */
#lf-map {
  width: 100%;
  height: 60vh;
  position: relative;
}

.leaflet-container {
  width: 100%;
  height: 100%;
}

/* 中央ターゲット */
#center-target {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 16px;
  height: 16px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 5;
}

#center-target::before,
#center-target::after {
  content: "";
  position: absolute;
  background: red;
}

#center-target::before {
  left: 50%;
  width: 1px;
  height: 100%;
  transform: translateX(-50%);
}

#center-target::after {
  top: 50%;
  height: 1px;
  width: 100%;
  transform: translateY(-50%);
}

/* メニュー */
.map-menu {
  position: absolute;
  bottom: 10px;
  left: 8px;
  right: 8px;

  background: #fff;
  border: 1px solid #191970;
  border-radius: 8px;

  padding: 4px 8px;
  z-index: 6;
}

/* リスト */
.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  display: flex;
  justify-content: space-between;
  align-items: center;

  font-size: 13px;
  line-height: 1.2;
  padding: 4px 0;

  border-bottom: 1px dotted #191970;
  cursor: pointer;
}

.map-menu li:last-child {
  border-bottom: none;
}

/* ナビ */
.nav-btn {
  font-size: 11px;
  color: #007aff;
  margin-left: 6px;
  cursor: pointer;
}

/* フッター */
footer {
  padding: 20px;
  text-align: center;
  background: #f5f5f5;
}
</style>
</head>

<body>

<header>
  釣り行こCHIBA（ヘッダー動作確認用）
</header>

<div id="lf-map">

  <!-- 中央ターゲット -->
  <div id="center-target"></div>

  <!-- メニュー -->
  <div id="map-menu" class="map-menu">
    <ul></ul>
  </div>

</div>

<footer>
  フッター（広告エリア想定）
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const map = L.map('lf-map').setView([35.15, 140.3], 8);

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  const menu = document.querySelector('#map-menu ul');

  const maxRows = 4;
  let currentPage = 0;

  // ダミーデータ（CSV想定）
  const points = [
    {name:'ポイント1', lat:35.15, lng:140.3},
    {name:'ポイント2', lat:35.2, lng:140.35},
    {name:'ポイント3', lat:35.25, lng:140.4},
    {name:'ポイント4', lat:35.3, lng:140.45},
    {name:'ポイント5', lat:35.35, lng:140.5},
    {name:'ポイント6', lat:35.4, lng:140.55}
  ];

  function renderMenu() {
    menu.innerHTML = '';

    const start = currentPage * maxRows;
    const end = Math.min(start + maxRows, points.length);

    for (let i = start; i < end; i++) {

      const li = document.createElement('li');

      const text = document.createElement('span');
      text.textContent = points[i].name;
      li.appendChild(text);

      // 次ページ
      if (i === end - 1 && end < points.length) {
        const next = document.createElement('span');
        next.textContent = '▶';
        next.className = 'nav-btn';
        next.onclick = (e) => {
          e.stopPropagation();
          currentPage++;
          renderMenu();
        };
        li.appendChild(next);
      }

      // 前ページ
      if (i === start && currentPage > 0) {
        const prev = document.createElement('span');
        prev.textContent = '◀';
        prev.className = 'nav-btn';
        prev.onclick = (e) => {
          e.stopPropagation();
          currentPage--;
          renderMenu();
        };
        li.appendChild(prev);
      }

      // クリックで移動
      li.onclick = () => {
        map.setView([points[i].lat, points[i].lng], 12);
      };

      menu.appendChild(li);
    }
  }

  renderMenu();

});
</script>

</body>
</html>
