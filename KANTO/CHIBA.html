<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* 地図 */
#lf-map {
  width: 100%;
  height: 60vh;
  position: relative;
  z-index: 0; 
}

.leaflet-container {
  z-index: 0;
}


#center-target {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 20px;
  height: 20px;

  pointer-events: none;
  z-index: 1990;
}

/* 縦線 */
#center-target::before,
#center-target::after {
  content: "";
  position: absolute;
  background: red;
}

/* 縦 */
#center-target::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

/* 横 */
#center-target::after {
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  transform: translateY(-50%);
}





/* メニュー */
.map-menu {
  position: absolute;
  bottom: 10px;
  left: 5px;
  right: 5px;

  background: #fff;
  border: 1px solid #191970;
  border-radius: 8px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.2);

  padding: 4px 8px;
  z-index: 1980;

  overflow: hidden;
  transition: max-height 0.25s ease;
}

/* リスト */
.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  display: flex;
  justify-content: space-between;
  align-items: center;

  font-size: 14px;
  padding: 6px 0;
  cursor: pointer;

  border-bottom: 1px dotted #191970;
}

.map-menu li:last-child {
  border-bottom: none;
}

/* ナビボタン */
.nav-btn {
  font-size: 12px;
  color: #007aff;
  margin-left: 8px;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<div id="lf-map">

  <!-- 中心ターゲット -->
  <div id="center-target"></div>

  <!-- メニュー -->
  <div id="map-menu" class="map-menu">
    <ul></ul>
  </div>

</div>

<footer>© 釣り行こNAVI</footer>



<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>


<!-- デバッグ表示（消さないで） -->
<div id="map-debug" style="
position:fixed;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:8px;
font-size:12px;
z-index:9999;
border-radius:6px;
">
  lat: <span id="lat">-</span><br>
  lng: <span id="lng">-</span><br>
  zoom: <span id="zoom">-</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function() {

  const map = L.map('lf-map').setView([35.15, 140.3], 8);
  map.attributionControl.setPrefix(false);

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  const menuBox = document.getElementById('map-menu');
  const menu = menuBox.querySelector('ul');

  const maxRows = 4;
  let currentPage = 0;

  // ダミーデータ（CSV想定）
  const points = [
    {name:'ポイント1', lat:35.15, lng:140.3},
    {name:'ポイント2', lat:35.2, lng:140.35},
    {name:'ポイント3', lat:35.25, lng:140.4},
    {name:'ポイント4', lat:35.3, lng:140.45},
    {name:'ポイント5', lat:35.35, lng:140.5},
    {name:'ポイント6', lat:35.4, lng:140.55}
  ];

  const totalPages = Math.ceil(points.length / maxRows);

  function renderMenu(){
    menu.innerHTML = '';

    const start = currentPage * maxRows;
    const end = Math.min(start + maxRows, points.length);

    for(let i=start;i<end;i++){
      const li = document.createElement('li');

      const text = document.createElement('span');
      text.textContent = points[i].name;
      li.appendChild(text);

      // 次ページ（4行目に埋め込み）
      if(i === end - 1 && currentPage < totalPages - 1){
        const next = document.createElement('span');
        next.textContent = '▶';
        next.className = 'nav-btn';
        next.onclick = (e)=>{
          e.stopPropagation();
          currentPage++;
          renderMenu();
        };
        li.appendChild(next);
      }

      // 前ページ（1行目に埋め込み）
      if(i === start && currentPage > 0){
        const prev = document.createElement('span');
        prev.textContent = '◀';
        prev.className = 'nav-btn';
        prev.onclick = (e)=>{
          e.stopPropagation();
          currentPage--;
          renderMenu();
        };
        li.appendChild(prev);
      }

      li.onclick = ()=>{
        map.setView([points[i].lat, points[i].lng], 12);
        menuBox.style.maxHeight = '0px';
      };

      menu.appendChild(li);
    }

    // 高さ自動調整（ヌルっと）
    menuBox.style.maxHeight = menuBox.scrollHeight + 'px';
  }

  renderMenu();



// 座標＆ズーム表示

  function updateDebug() {
    const center = map.getCenter();
    document.getElementById('lat').textContent = center.lat.toFixed(5);
    document.getElementById('lng').textContent = center.lng.toFixed(5);
    document.getElementById('zoom').textContent = map.getZoom();
  }

  map.on('move', updateDebug);
  map.on('zoom', updateDebug);
  updateDebug();
});

</script>

</body>
</html>
