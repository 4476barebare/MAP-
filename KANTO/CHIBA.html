<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* 地図 */
#lf-map {
  width: 100%;
  height: 60vh;
  position: relative;
  z-index: 0; 
}

.leaflet-container {
  z-index: 0;
}

#center-target {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  pointer-events: none;
  z-index: 1990;
}

#center-target::before,
#center-target::after {
  content: "";
  position: absolute;
  background: red;
}

#center-target::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

#center-target::after {
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  transform: translateY(-50%);
}

/* メニュー */
.map-menu {
  position: absolute;
  bottom: 10px;
  left: 5px;
  right: 5px;
  background: #fff;
  border: 1px solid #191970;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  padding: 4px 8px;
  z-index: 1980;
  overflow: hidden;
  transition: max-height 0.25s ease;
}

.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: #191970;
  padding: 5px 0;
  cursor: pointer;
  border-bottom: 1px dotted #191970;
}

.map-menu li:last-child {
  border-bottom: none;
}

.nav-btn {
  font-size: 12px;
  color: #007aff;
  margin-left: 8px;
}

/* 天気UI */
#weather-container {
  width: fit-content;
  margin: 10px auto;
  display: flex;
  flex-direction: column;
  font-family: monospace;
  font-size: 8px;
}

.weather-row {
  display: flex;
  align-items: center;
  margin-bottom: 2px;
}

.weather-block {
  width: 16px; /* 2時間刻みのブロック幅 */
  text-align: center;
  margin-right: 1px;
  white-space: nowrap;
}

.weather-block:first-child {
  width: 10px; /* 見出し */
  font-weight: bold;
}

.weather-icon {
  display: block;
  width: 10px;
  height: 10px;
  margin: 0 auto;
}

.weather-text {
  display: block;
  font-size: 8px;
  line-height: 1;
}

</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>

<div id="lf-map">
  <div id="center-target"></div>
  <div id="map-menu" class="map-menu">
    <ul></ul>
  </div>
</div>

<!-- 天気UI -->
<div id="weather-container">
  <div class="weather-row" id="time-row"></div>
  <div class="weather-row" id="icon-row"></div>
  <div class="weather-row" id="temp-row"></div>
  <div class="weather-row" id="precip-row"></div>
  <div class="weather-row" id="wind-row"></div>
</div>

<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- デバッグ表示 -->
<div id="map-debug" style="
position:fixed;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:8px;
font-size:12px;
z-index:9999;
border-radius:6px;
">
  lat: <span id="lat">-</span><br>
  lng: <span id="lng">-</span><br>
  zoom: <span id="zoom">-</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function() {

  // ===== 地図初期化 =====
  const map = L.map('lf-map').setView([35.45, 140.25], 9);
  map.attributionControl.setPrefix(false);

  const tileLayer = L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  tileLayer.getContainer().style.filter =
    "grayscale(100%) brightness(110%) contrast(110%)";

  const blueOverlay = L.rectangle(map.getBounds(), {
    color: "#191970",
    weight: 0,
    fillOpacity: 0.1,
    interactive: false
  }).addTo(map);

  // ===== メニュー =====
  const menuBox = document.getElementById('map-menu');
  const menu = menuBox.querySelector('ul');
  const maxRows = 4;
  let currentPage = 0;

  const points = [
    {name:'内房エリア', lat:35.15, lng:140.3},
    {name:'南房総エリア', lat:35.2, lng:140.35},
    {name:'外房エリア', lat:35.25, lng:140.4},
    {name:'九十九里銚子エリア', lat:35.3, lng:140.45},
  ];

  const totalPages = Math.ceil(points.length / maxRows);

  function renderMenu(){
    menu.innerHTML = '';
    const start = currentPage * maxRows;
    const end = Math.min(start + maxRows, points.length);

    for(let i=start;i<end;i++){
      const li = document.createElement('li');
      const text = document.createElement('span');
      text.textContent = points[i].name;
      li.appendChild(text);

      if(i === end - 1 && currentPage < totalPages - 1){
        const next = document.createElement('span');
        next.textContent = '▶';
        next.className = 'nav-btn';
        next.onclick = (e)=>{
          e.stopPropagation();
          currentPage++;
          renderMenu();
        };
        li.appendChild(next);
      }

      if(i === start && currentPage > 0){
        const prev = document.createElement('span');
        prev.textContent = '◀';
        prev.className = 'nav-btn';
        prev.onclick = (e)=>{
          e.stopPropagation();
          currentPage--;
          renderMenu();
        };
        li.appendChild(prev);
      }

      li.onclick = ()=>{
        map.setView([points[i].lat, points[i].lng], 12);
        menuBox.style.maxHeight = '0px';
      };

      menu.appendChild(li);
    }

    menuBox.style.maxHeight = menuBox.scrollHeight + 'px';
  }

  renderMenu();

  // ===== デバッグ表示 =====
  const latEl = document.getElementById('lat');
  const lngEl = document.getElementById('lng');
  const zoomEl = document.getElementById('zoom');

  function updateDebug() {
    const center = map.getCenter();
    latEl.textContent = center.lat.toFixed(5);
    lngEl.textContent = center.lng.toFixed(5);
    zoomEl.textContent = map.getZoom();
  }

  map.whenReady(updateDebug);
  map.on('move', updateDebug);
  map.on('zoom', updateDebug);

  // ===== 天気UI生成（サンプルデータ） =====
  const hours = [];
  for(let i=0;i<12;i++){ hours.push(i*2); } // 0,2,...22

  const precip = [0,10,20,30,10,0,0,20,30,10,0,0];
  const wind = [1.2,2.0,2.5,3.0,1.8,1.0,1.5,2.0,2.2,1.5,1.0,0.5];
  const icon = ['🌙','🌙','☀️','☀️','☁️','☁️','☀️','☀️','🌙','🌙','🌙','🌙'];
  const windDir = ['↑','↗','→','↘','↓','↙','←','↖','↑','↗','→','↘'];

  const rows = {
    'time-row': hours,
    'icon-row': icon,
    'temp-row': [10,11,12,12,14,16,18,16,13,12,10,10],
    'precip-row': precip,
    'wind-row': wind.map((v,i)=>v.toFixed(1)+' '+windDir[i])
  };

  for(const id in rows){
    const container = document.getElementById(id);
    container.innerHTML = '';
    container.appendChild(document.createElement('span')).textContent = ''; // 見出し1列目
    rows[id].forEach(v=>{
      const block = document.createElement('span');
      block.className='weather-block';
      block.textContent = v;
      container.appendChild(block);
    });
  }

});
</script>
</body>
</html>
