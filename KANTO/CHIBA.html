<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<!-- CSS -->
<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="/MAP-/map.css">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-sA+e2pA+6y6ILm4QyZ91z6/WTGnT8FxZ2P8eT+Zg5uw="
  crossorigin=""
/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

main {
  width: 100%;
  height: 512px;      /* 高さは固定 */
  position: relative;  /* Leaflet基準 */
  background-color: red; /* 背景目立たせる */
}

#lf-map {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#log-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 120px;
  overflow-y: auto;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 12px;
  padding: 5px;
  z-index: 999;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<!-- Leaflet 地図 -->
<main id="lf-map"></main>

<!-- ログパネル -->
<div id="log-panel"></div>

<footer>© 釣り行こNAVI</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-vy8j7qzv/N8IWrp4IdfZrIh0Y8zXk3T1N7tGgKZ8Z2c="
  crossorigin="">
</script>

<!-- ヘッダー操作 -->
<script src="/MAP-/header.js" defer></script>

<script>
function addLog(msg) {
  const panel = document.getElementById('log-panel');
  console.log(msg);
  if(panel) {
    const p = document.createElement('div');
    p.textContent = msg;
    panel.appendChild(p);
    panel.scrollTop = panel.scrollHeight;
  }
}

function adjustLfMapPosition() {
  const header = document.querySelector('header');
  const lfMap = document.getElementById('lf-map');
  if (!header || !lfMap) return;

  const headerHeight = header.offsetHeight;
  lfMap.style.top = headerHeight + 'px';
}

// 初回ロードとリサイズ対応
window.addEventListener('load', adjustLfMapPosition);
window.addEventListener('resize', adjustLfMapPosition);

// Leaflet 初期化
window.addEventListener('load', () => {
  const lfMapDiv = document.getElementById('lf-map');

  const leafletMap = L.map(lfMapDiv, {
    zoomControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    touchZoom: false,
    boxZoom: false,
    keyboard: false,
    tap: false,
    attributionControl: false,
    preferCanvas: true
  });

  // OpenStreetMap タイル追加
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);

  // 中心座標・ズーム
  const centerLatLng = [35.5, 140.25]; // 千葉あたり
  const zoomLevel = 10;
  leafletMap.setView(centerLatLng, zoomLevel);

  addLog('Leaflet 初期化完了');
  addLog('lf-map offsetWidth: ' + lfMapDiv.offsetWidth);
  addLog('lf-map offsetHeight: ' + lfMapDiv.offsetHeight);

  // タイルズレ防止（100ms 待機）
  setTimeout(() => {
    leafletMap.invalidateSize(true);
    addLog('Leaflet invalidateSize() 実行');
    addLog('lf-map offsetWidth: ' + lfMapDiv.offsetWidth);
    addLog('lf-map offsetHeight: ' + lfMapDiv.offsetHeight);
  }, 100);
});
</script>

</body>
</html>
