<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; background:#fff; overflow-x:hidden; }
li, button { -webkit-tap-highlight-color: rgba(0,0,0,0); }
li:active, button:active { background: transparent; }
li { user-select: none; cursor: pointer; }
.leaflet-control-attribution { font-size: 8px; background: rgba(255,255,255,0.5); }
#lf-map { width:100%; height:80vh; position:relative; z-index:0; }
.leaflet-container { z-index:0; }

/* メニューは初期非表示 */
.map-menu { display:none; position: absolute; bottom: 5px; left: 5px; right: 5px; max-height: 200px; background: #fff; border-radius: 3px; overflow-y: auto; z-index: 1980; padding: 2px 5px; pointer-events: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
#map-menu, #map-menu ul, #map-menu li, #map-menu button { pointer-events: auto; }
.map-menu ul { list-style: none; margin: 0; padding: 0; }
.map-menu li { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #191970; padding: 4px 8px; width: 100%; box-sizing: border-box; cursor: pointer; border-bottom: 1px dotted #191970; }
.map-menu li:last-child { border-bottom: none; padding-bottom: 3px; }
#map-menu button { width: 100%; background: transparent; border: none; color: inherit; cursor: pointer; padding: 0; font-size: inherit; text-align: left; }
.map-ad { position: absolute; top: 12px; left: 5px; z-index: 1500; pointer-events: none; }
.map-ad .ad-box { width: 320px; height: 50px; background: rgba(255,255,255,0.9); border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #333; pointer-events: auto; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border-radius: 4px; }


.map-back-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 2000;

    background: none;
    border: none;
    padding: 0;

    -webkit-appearance: none;
    appearance: none;
}
.back-icon {
    width:36px;
    height:36px;
    fill:#fff;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
}


.spot-label {

    align-items: center;
    gap: 1px; /* アイコンと文字の間 */
    border: 1px solid #ffffff; /* 枠白1px */
    border-radius: 3px;         /* 角丸3px */
    background-color: #191970;  /* 背景色 */
    box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* ドロップシャドウ */
    
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
}

.spot-label svg {
    margin-top: 4px;
    width: 16px;
    height: 16px;

    fill: #fff; /* SVGの塗り色 */
}

.spot-label span {
    color: #fff; /* テキスト色 */
}

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>


<div id="lf-map">
  <div class="map-ad">
    <div class="ad-box">AD 320×50</div>
  </div>
  <div id="map-menu" class="map-menu"><ul></ul></div>
  <button id="map-back-btn" class="map-back-btn"></button>
</div>


<div id="weather-wave-tide-container"></div>
<div id="newsOverlay"><div class="news-window"><button id="closeNews">閉じる</button><div class="news-content"></div></div></div>
<footer>© 釣り行こNAVI</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>
<script src="/MAP-/js/dataLoader.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const csvUrl = '/MAP-/data/location.csv';
    const currentFile = location.pathname.split('/').pop();

    // --- デバッグ表示 ---
    function showDebug(msg) {
        let debugEl = document.getElementById('debug');
        if (!debugEl) {
            debugEl = document.createElement('div');
            debugEl.id = 'debug';
            debugEl.style.position = 'fixed';
            debugEl.style.top = '0';
            debugEl.style.left = '0';
            debugEl.style.background = 'rgba(255,255,0,0.8)';
            debugEl.style.zIndex = '9999';
            debugEl.style.padding = '4px';
            debugEl.style.fontSize = '12px';
            debugEl.style.maxWidth = '300px';
            debugEl.style.whiteSpace = 'pre-wrap';
            document.body.appendChild(debugEl);
        }
        debugEl.textContent = msg;
    }

    showDebug('DOMContentLoaded');

    loadLocationCSV(csvUrl, currentFile).then(data => {
        showDebug('CSV loaded: main=' + !!data.main);

        if (!data.main) return;

        // 初期ハッシュ判定
        const initialHash = location.hash;
        if (initialHash) {
            const parts = decodeURIComponent(initialHash.substring(1)).split('/');
            const areaName = parts[0];
            const spotName = parts[1];

            window.currentHash = initialHash;

            showDebug('Initial hash: ' + initialHash);

            if (spotName) {
                selectSpot(areaName, spotName);
                showDebug('selectSpot called: ' + areaName + '/' + spotName);
            } else {
                selectArea(areaName);
                showDebug('selectArea called: ' + areaName);
            }
        } else {
            drawLocation(window.prefData.name, window.prefData.lat, window.prefData.lng, window.prefData.zoom, window.prefData.maxZoom);
            showDebug('Initial drawLocation called');

            document.getElementById('map-menu').style.display = 'block';
            document.getElementById('map-back-btn').style.display = 'none'
        }

        // メニュー生成
        const menuUl = document.querySelector('#map-menu ul');
        menuUl.innerHTML = '';
        window.areaData.forEach(area => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.textContent = area.name;
            btn.onclick = () => {
                selectArea(area.name);
                showDebug('Area clicked: ' + area.name);
            };
            li.appendChild(btn);
            menuUl.appendChild(li);
        });
        
        // ←ここに追加
document.getElementById('map-menu').addEventListener('click', e => {
    e.stopPropagation(); // 地図へのクリック伝播を止める
})
        
        showDebug('Menu generated: ' + window.areaData.length + ' areas');

        // --- 最寄りクリック判定 ---
        setupNearestClick();

    }).catch(() => {
        showDebug('CSV読み込みに失敗しました');
    });

    // 戻るボタン
    document.getElementById('map-back-btn').addEventListener('click', () => {
        goBack(window.currentHash);
        showDebug('Back button pressed');
    });

    // --- 最寄りクリック用ハンドラを保持 ---
    window.nearestClickHandler = null;

    // --- 最寄りクリック判定の設定 ---
    function setupNearestClick() {
        if (!window.map) {
            showDebug('setupNearestClick: map is undefined');
            return;
        }
        if (window.nearestClickHandler) window.map.off('click', window.nearestClickHandler);

        window.nearestClickHandler = function(e) {
            const menuRect = document.getElementById('map-menu').getBoundingClientRect();
            if (e.originalEvent.clientX >= menuRect.left &&
                e.originalEvent.clientX <= menuRect.right &&
                e.originalEvent.clientY >= menuRect.top &&
                e.originalEvent.clientY <= menuRect.bottom) {
                showDebug('Click ignored (menu area)');
                return;
            }

            let nearestArea = null, minDist = Infinity;
            window.areaData.forEach(area => {
                const dLat = e.latlng.lat - area.lat;
                const dLng = e.latlng.lng - area.lng;
                const dist = dLat*dLat + dLng*dLng;
                if (dist < minDist) { minDist = dist; nearestArea = area.name; }
            });

            if (nearestArea) {
                showDebug('Nearest click detected: ' + nearestArea);
                selectArea(nearestArea);
            } else {
                showDebug('Nearest click: no area found');
            }
        };

        window.map.on('click', window.nearestClickHandler);
        showDebug('Nearest click handler set');
    }

    // --- 最寄りクリック判定を解除 ---
    function removeNearestClick() {
        if (window.nearestClickHandler && window.map) {
            window.map.off('click', window.nearestClickHandler);
            window.nearestClickHandler = null;
            showDebug('Nearest click handler removed');
        }
    }
    
fetch('/MAP-/icon/back.svg')
  .then(res => res.text())
  .then(svg => {
    const btn = document.getElementById('map-back-btn');
    btn.innerHTML = svg;

    const svgEl = btn.querySelector('svg'); // ←ここ
    if (svgEl) svgEl.classList.add('back-icon');
  });
});

// popstate で currentHash を渡す
window.addEventListener('popstate', () => {
    const newHash = location.hash;  // 現在ブラウザのハッシュ
    const prevHash = window.currentHash; // 画面上で最後に設定されたハッシュ

    // ハッシュが短くなった場合＝ブラウザバック
    if (newHash.length < prevHash.length) {
        goBack(prevHash);  // 前のハッシュを渡す
    }

    // currentHash は常に最新に更新
    window.currentHash = newHash;
});




</script>
</body>
</html>
