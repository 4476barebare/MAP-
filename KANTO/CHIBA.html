<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

#lf-map {
  width: 100%;
  height: 60vh;
  position: relative;
}

.leaflet-container {
  z-index: 0;
}

.map-menu {
  position: absolute;
  bottom: 10px;
  left: 5px;
  right: 5px;
  background: rgba(255,255,255,0.95);
  padding: 6px 10px;
  box-shadow: 0 0 4px rgba(0,0,0,0.3);
  border-radius: 6px;
  z-index: 500;
  overflow: hidden;
}

.map-menu ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.map-menu li {
  padding: 2px 0;
  cursor: pointer;
}

.map-menu li.next-page,
.map-menu li.prev-page {
  font-weight: bold;
  text-align: right;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>

<div id="lf-map">

  <div id="map-menu" class="map-menu">
    <ul></ul>
  </div>

</div>

<footer>© 釣り行こNAVI</footer>

<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function() {

  const map = L.map('lf-map').setView([35.15, 140.3], 8);
  map.attributionControl.setPrefix(false);
  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

  const menu = document.querySelector('#map-menu ul');
  const maxRowsPerPage = 4;

  // --- ダミーデータ（将来的にCSVロード） ---
  const points = [
    {name:'ポイント1', lat:35.15, lng:140.3},
    {name:'ポイント2', lat:35.2, lng:140.35},
    {name:'ポイント3', lat:35.25, lng:140.4},
    {name:'ポイント4', lat:35.3, lng:140.45},
    {name:'ポイント5', lat:35.35, lng:140.5},
    {name:'ポイント6', lat:35.4, lng:140.55},
    {name:'ポイント7', lat:35.45, lng:140.6}
  ];

  let currentPage = 0;
  const totalPages = Math.ceil(points.length / maxRowsPerPage);

  function renderMenu() {
    menu.innerHTML = '';
    const start = currentPage * maxRowsPerPage;
    const end = Math.min(start + maxRowsPerPage, points.length);
    for(let i=start;i<end;i++){
      const li = document.createElement('li');
      li.textContent = points[i].name;
      li.dataset.lat = points[i].lat;
      li.dataset.lng = points[i].lng;
      li.addEventListener('click', function() {
        map.setView([parseFloat(this.dataset.lat), parseFloat(this.dataset.lng)], 12);
        menu.innerHTML = '';
      });
      menu.appendChild(li);
    }

    // 次ページボタン
    if(currentPage < totalPages - 1){
      const liNext = document.createElement('li');
      liNext.textContent = '▶ 次ページ';
      liNext.classList.add('next-page');
      liNext.addEventListener('click', function(){
        currentPage++;
        renderMenu();
      });
      menu.appendChild(liNext);
    }

    // 前ページボタン
    if(currentPage > 0){
      const liPrev = document.createElement('li');
      liPrev.textContent = '◀ 前ページ';
      liPrev.classList.add('prev-page');
      liPrev.addEventListener('click', function(){
        currentPage--;
        renderMenu();
      });
      menu.appendChild(liPrev);
    }
  }

  renderMenu();

});
</script>

</body>
</html>
