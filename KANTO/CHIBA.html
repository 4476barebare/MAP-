<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<!-- ヘッダーCSS -->
<link rel="stylesheet" href="/MAP-/header.css">

<!-- Leaflet CSS -->
<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

/* 地図（元のまま） */
#lf-map {
  width: 100%;
  height: 500px;
  background: red;
}
</style>
</head>

<body>

<!-- ヘッダー -->
<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn" onclick="event.stopPropagation()">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>
<!-- 地図 -->
<div id="lf-map"></div>

<!-- フッター -->
<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- JS（順番重要） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- header.js（そのまま） -->
<script src="/MAP-/header.js" defer></script>

<!-- ★ここだけ修正（実行タイミング） -->
<script>
window.addEventListener('DOMContentLoaded', function() {

  const map = L.map('lf-map').setView([35.5, 140.25], 10);

  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

});
</script>

</body>
</html>
