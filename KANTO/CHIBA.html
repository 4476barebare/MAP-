<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0; padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff; overflow-x:hidden;
}

/* 地図 */
#lf-map { width:100%; height:60vh; position:relative; z-index:0; }
.leaflet-container { z-index:0; }

/* ← これが抜けてたやつ（重要） */
.leaflet-tile {
  filter: grayscale(100%) brightness(110%) contrast(110%);
}

#center-target {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:20px; height:20px; pointer-events:none; z-index:1990;
}
#center-target::before,#center-target::after{content:"";position:absolute;background:red;}
#center-target::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
#center-target::after{top:50%;left:0;width:100%;height:2px;transform:translateY(-50%);}

/* メニュー */
.map-menu {
  position:absolute; bottom:10px; left:5px; right:5px;
  background:#fff; border:1px solid #191970; border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2); padding:4px 8px; z-index:1980;
  overflow:hidden; transition:max-height 0.25s ease;
}
.map-menu ul { list-style:none; margin:0; padding:0; }
.map-menu li {
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; color:#191970; padding:5px 0; cursor:pointer;
  border-bottom:1px dotted #191970;
}
.map-menu li:last-child { border-bottom:none; }
.nav-btn { font-size:12px; color:#007aff; margin-left:8px; }

/* UI */
.weather-container, #weather-wave-tide-container {
  width:100%; display:flex; flex-direction:column;
  font-family:monospace; font-size:10px; margin-top:5px; text-align:center;
}

.weather-row { display:flex; justify-content:space-between; margin-bottom:1px; }

.weather-block {
  flex:1; text-align:center; font-size:10px; line-height:1.1;
  padding:1px 0; border-radius:2px; margin-right:1px;
}

.weather-block.first-block { flex:0 0 30px; font-weight:bold; }

.tide-label {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 色 */
.time-block{background:#e0e0e0;}
.icon-block{background:#ffffe0;}
.temp-block{background:#ffcccc;}
.precip-block{background:#cce0ff;}
.wind-block{background:#ccffcc;}
.winddir-block{background:#f0ccff;}
.wave-block{background:#ffebcc;}

.weather-header {
  display:flex;
  justify-content:space-between;
  font-size:10px;
  margin:2px 0;
}

/* ニュース */
#newsOverlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:3000;
}
.news-window{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  width:90%;
  max-height:80%;
  overflow:auto;
  padding:10px;
  border-radius:8px;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>

<div id="lf-map">
  <div id="center-target"></div>
  <div id="map-menu" class="map-menu"><ul></ul></div>
</div>

<div id="weather-wave-tide-container"></div>

<footer>© 釣り行こNAVI</footer>

<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script>
window.addEventListener('DOMContentLoaded', function() {

  const map = L.map('lf-map').setView([35.45,140.25],9);
  L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map);

  // ===== 見出し定義（修正ポイント）=====
  const labels = {
    time: '',
    icon: '天気',
    temp: '°c',
    precip: '%',
    wind: 'm/s',
    winddir: '',
    wave: '波高'
  };

  function renderWeatherWaveTide(date, weatherData, waveData, tideData, tideName) {

    const container = document.getElementById('weather-wave-tide-container');
    container.innerHTML='';

    const keys=['time','icon','temp','precip','wind','winddir'];

    keys.forEach(key=>{
      const row=document.createElement('div');
      row.className='weather-row';

      const label=document.createElement('span');
      label.className='weather-block first-block';
      label.textContent = labels[key];
      row.appendChild(label);

      weatherData[key].forEach((v,i)=>{
        const b=document.createElement('span');
        b.className='weather-block';
        if(key==='time' && i%2!==0) b.textContent='';
        else b.textContent=v;
        row.appendChild(b);
      });

      container.appendChild(row);
    });

    // 波
    const waveRow=document.createElement('div');
    waveRow.className='weather-row';

    const waveLabel=document.createElement('span');
    waveLabel.className='weather-block first-block';
    waveLabel.textContent='波高';
    waveRow.appendChild(waveLabel);

    waveData.forEach(v=>{
      const b=document.createElement('span');
      b.className='weather-block wave-block';
      b.textContent=v+'m';
      waveRow.appendChild(b);
    });

    container.appendChild(waveRow);

    // 潮
    const tideRow=document.createElement('div');
    tideRow.className='weather-row';

    const tideLabel=document.createElement('span');
    tideLabel.className='weather-block first-block tide-label';
    tideLabel.textContent=tideName;
    tideRow.appendChild(tideLabel);

    const canvas=document.createElement('canvas');
    canvas.style.flex='1';
    canvas.style.height='36px';
    tideRow.appendChild(canvas);

    container.appendChild(tideRow);

    const ctx=canvas.getContext('2d');

    function draw(data){
      const rect=canvas.getBoundingClientRect();
      canvas.width=rect.width;
      canvas.height=rect.height;

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const getX = i => i/(data.length-1)*canvas.width;
      const getY = v => canvas.height - v * canvas.height * 0.8;

      ctx.beginPath();
      data.forEach((v,i)=>{
        const x=getX(i);
        const y=getY(v);
        if(i===0) ctx.moveTo(x,y);
        else {
          const prevX=getX(i-1);
          const prevY=getY(data[i-1]);
          const cx=(prevX+x)/2;
          ctx.quadraticCurveTo(prevX, prevY, cx, (prevY+y)/2);
          ctx.lineTo(x,y);
        }
      });

      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();

      ctx.fillStyle='#0077cc';
      ctx.fill();

      ctx.beginPath();
      data.forEach((v,i)=>{
        const x=getX(i);
        const y=getY(v);
        if(i===0) ctx.moveTo(x,y);
        else {
          const prevX=getX(i-1);
          const prevY=getY(data[i-1]);
          const cx=(prevX+x)/2;
          ctx.quadraticCurveTo(prevX, prevY, cx, (prevY+y)/2);
          ctx.lineTo(x,y);
        }
      });

      ctx.strokeStyle='#0077cc';
      ctx.stroke();
    }

    draw(tideData);
    window.addEventListener('resize',()=>draw(tideData));
  }

});
</script>
</body>
</html>
