<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こCHIBA</title>

<link rel="stylesheet" href="/MAP-/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0; padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff; overflow-x:hidden;
}

li, button {
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}

li:active,
button:active {
  background: transparent;
}

li {
  user-select: none;
  cursor: pointer;
}

/* 地図 */
#lf-map { width:100%; height:60vh; position:relative; z-index:0; }
.leaflet-container { z-index:0; }

#center-target {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:20px; height:20px; pointer-events:none; z-index:1990;
}
#center-target::before,#center-target::after{content:"";position:absolute;background:red;}
#center-target::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
#center-target::after{top:50%;left:0;width:100%;height:2px;transform:translateY(-50%);}





/* メニュー */
.map-menu {
  position: static;
  bottom:0px;
  left:5px;
  right:5px;
  border-top:1px solid #191970;
  border-bottom: 1px solid #191970;
  padding:4px 8px; z-index:1980;
  overflow:hidden;
  transition:max-height 0.25s ease;
}
.map-menu ul { list-style:none; margin:0; padding:0; }
.map-menu li {
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; color:#191970; padding:5px 0; cursor:pointer;
  border-bottom:1px dotted #191970;
}
.map-menu li:last-child { border-bottom:none; }
.nav-btn { font-size:12px; color:#007aff; margin-left:8px; }

/* 天気UI */

#weather-wave-tide-container {
  display: none;
  border-top:1px solid #191970;
}

.weather-header {
  display:flex;
  justify-content:space-between;
  font-size:10px;
  padding-left:2px;
  padding-bottom: 0px;
  margin-bottom: -2px;
}

.weather-container, #weather-wave-tide-container {
  width:100%; display:flex; flex-direction:column;
  color: #191970;
  font-family:monospace;
  font-size:10px;
  text-align:center;
  margin-top:0px;
  margin-bottom: -3px;
}

.weather-block {
  flex:1;
  text-align:center;
  font-size:10px;
  line-height:1.1;
  padding:1px 0;
  margin-right:1px;
}

.weather-block.first-block {
    flex:0 0 30px;
}

/* 潮名縦書き */
.tide-label {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display:flex;
  align-items:center;
  justify-content:center;
}

.weather-row {
    display:flex;
    justify-content:space-between;
    }

.spot-wrap {
  background: transparent;
  border: none;
}

.spot-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 120px;
}

/* 1行目：アイコン＋テキスト */
.spot-main {
    color: white;
  display: flex;
  align-items: center;     /* ←ここ重要（2行ズレ防止） */
  justify-content: center;
  gap: 4px;

  background: #191970;

  padding: 4px 6px;
  border-radius: 3px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);

  max-width: 120px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* アイコン */
.spot-main img {
    filter: brightness(0) invert(1);
  width: 18px;
  height: 18px;
  margin-top: 0; /* 文字との高さ合わせ */
}

/* テキスト折り返し */
.spot-main span {
 display: block;
  text-align: center;

  font-size: 12px;
  line-height: 1.2;

  word-break: break-word;
  overflow-wrap: break-word;

  /* 2行制限 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  
}

/* ▼ */
.spot-arrow {
  color: #191970;
  font-size: 14px;
  line-height: 10px;

  text-align: center;

  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
}




</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こCHIBA</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">スポット一覧</a>
    </nav>
  </div>
</header>



<div id="lf-map">
  <div id="center-target"></div>
  <!-- 戻るボタン -->
  <button id="map-back-btn" style="
    position:absolute;
    bottom:50px; /* 著作権表記の上に調整 */
    right:10px;
    display:none;
    z-index:2000;
    background:#fff;
    border:1px solid #888;
    border-radius:4px;
    padding:4px 6px;
    font-size:12px;
    cursor:pointer;
  ">← 戻る</button>
</div>

<div id="map-menu" class="map-menu"><ul></ul></div>
<div id="weather-wave-tide-container"></div>



<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<footer>© 釣り行こNAVI</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/MAP-/header.js" defer></script>

<script src="/MAP-/js/dataLoader.js"></script>


<script>
document.addEventListener('DOMContentLoaded', () => {

    // CSVのURLを定義
    const csvUrl = '/MAP-/data/location.csv';

    // CSV読み込み
    loadLocationCSV(csvUrl).then(data => {

        // 本体データを prefData に格納
        window.prefData = data.main;

        if (!window.prefData) {
            console.error('CSVに県本体データがありません');
            alert('県本体データがありません');
            return;
        }

        // URLハッシュをチェック
        let initialHash = '';
        if (!location.hash || location.hash === '') {
            initialHash = ''; // ハッシュが空なら空文字固定
        }

        // drawLocation に座標とズームを渡して描画
        drawLocation(
            window.prefData.name,
            window.prefData.lat,
            window.prefData.lng,
            window.prefData.zoom,
            window.prefData.maxZoom,
            'std' // 標準地図
        );

        // 読み込んだ県名と直下のエリア名をアラートで表示
        const areaNames = data.areas.map(a => a.name).join(', ');
        alert(`県名: ${window.prefData.name}\nエリア: ${areaNames}`);

    }).catch(err => {
        console.error('CSV読み込みエラー:', err);
        alert('CSV読み込みに失敗しました');
    });

});
</script>
</html>
