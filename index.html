<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<!-- 外部CSS -->
<link rel="stylesheet" href="header.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">地域</a>
      <a href="#">ニュース</a>
    </nav>
    <div class="accordion-wrapper">
      <button class="accordion-btn">登録地点</button>
      <div class="accordion-panel">
        <ul id="locationList" class="location-list">
          <li class="location-none">登録なし</li>
        </ul>
      </div>
    </div>
  </div>
</header>

<button id="newsBtn" style="margin-top:80px;">ニュース</button>

<div id="newsOverlay">
  <div class="news-window">
    <p>ニュースコンテンツ</p>
    <button id="closeNews">閉じる</button>
  </div>
</div>

<div style="height:1500px; padding-top:20px;">
  <p>ここに地図やその他コンテンツが入ります。</p>
</div>

<!-- 外部JS -->
<script src="header.js"></script>
</body>
</html>
