<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<style>
html, body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff;
  color:#333;
  overflow-x: hidden; /* 横スクロール禁止 */
}
header {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  border-bottom:1px solid #191970;
  background:#fff;
}
.header-inner {
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
}
.logo { font-weight:700; font-size:0.8rem; color:#191970; }
.nav { display:flex; align-items:center; gap:14px; }
.nav a { text-decoration:none; color:#191970; font-size:0.8rem; }
.accordion-wrapper { position:relative; }
.accordion-btn { background:none; border:none; font-size:0.8rem; color:#191970; cursor:pointer; }
.accordion-panel { display:none; position:absolute; top:30px; left:0; background:#f9f9f9; border:1px solid #ddd; border-radius:4px; padding:8px; min-width:150px; }
.location-list { list-style:none; padding:0; margin:0; }
.location-list li { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:14px; }
.delete-btn { background:none; border:none; cursor:pointer; color:#c00; }
.location-none { color:#888; font-style:italic; }

main { padding-top:60px; }
.map { text-align:center; }
.japan-map { width:100%; max-width:900px; margin:0 auto; filter:drop-shadow(0 3px 5px rgba(0,0,0,0.22)); }

/* ラベル */
.region-label {
  font-size:14px;
  font-weight:bold;
  fill:#000;
  text-anchor:middle;
  pointer-events:none;
}

footer {
  margin-top:40px;
  padding:20px;
  text-align:center;
  font-size:13px;
  color:#777;
  border-top:1px solid #ddd;
}

/* ニュースオーバーレイ */
#newsOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.55); display:none;
  justify-content:center; align-items:center;
  z-index:999;
}
.news-window {
  position:relative; width:85%; max-width:900px; height:70vh;
  background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  overflow:hidden; display:flex; flex-direction:column;
}
</style>
</head>

<body>

<header>
<div class="header-inner">
  <div class="logo">釣り行こNAVI</div>
  <nav class="nav">
    <div class="accordion-wrapper">
      <button class="accordion-btn">登録地点 ▼</button>
      <div class="accordion-panel">
        <ul class="location-list" id="locationList">
          <li>新潟 <button class="delete-btn">✖️</button></li>
          <li>群馬 <button class="delete-btn">✖️</button></li>
          <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
        </ul>
      </div>
    </div>
    <a href="#" id="newsBtn">釣りNEWS</a>
    <a href="#">全国地図</a>
    <a href="#">その他</a>
  </nav>
</div>
</header>

<main>
  <div class="map">
    <div class="japan-map" id="map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>
<footer>© 釣り行こNAVI</footer>

<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<script>
// --------------------
// ヘッダー / アコーディオン
// --------------------
const accordionBtn = document.querySelector('.accordion-btn');
const panel = document.querySelector('.accordion-panel');
accordionBtn.addEventListener('click', ()=>{
  document.querySelectorAll('.accordion-panel').forEach(p=>{
    if(p!==panel) p.style.display='none';
  });
  panel.style.display = (panel.style.display==='block') ? 'none':'block';
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.accordion-wrapper')){
    document.querySelectorAll('.accordion-panel').forEach(p=>p.style.display='none');
  }
});

// 登録地点リスト 操作
const locationList = document.getElementById('locationList');
function attachDeleteEvents() {
  locationList.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const li = btn.parentElement;
      li.remove();
      if(locationList.children.length === 0){
        locationList.innerHTML = '<li class="location-none">登録なし</li>';
      }
    });
  });
}
attachDeleteEvents();
function addLocation(name){
  const noneItem = locationList.querySelector('.location-none');
  if(noneItem) noneItem.remove();
  const li = document.createElement('li');
  li.textContent = name + ' ';
  const btn = document.createElement('button');
  btn.textContent = '✖️';
  btn.className = 'delete-btn';
  li.appendChild(btn);
  locationList.appendChild(li);
  attachDeleteEvents();
}
function resetLocations(){ locationList.innerHTML = '<li class="location-none">登録なし</li>'; }

// --------------------
// ニュースオーバーレイ
// --------------------
const newsBtn = document.getElementById("newsBtn");
const overlay = document.getElementById("newsOverlay");
const closeBtn = document.getElementById("closeNews");
newsBtn.addEventListener("click", e=>{
  e.preventDefault();
  overlay.style.display="flex";
});
closeBtn.addEventListener("click", ()=>{ overlay.style.display="none"; });

// --------------------
// 地図（SVG）処理
// --------------------

// 都道府県 名称一覧（ラベル）
const prefNames = {
  hokkaido:'北海道',
  aomori:'青森県',
  iwate:'岩手県',
  miyagi:'宮城県',
  akita:'秋田県',
  yamagata:'山形県',
  fukushima:'福島県',
  // 必要な県を追加して下さい
};

// 地域グループID 配列
const regionIDs = ['Path_1','Path_2','Path_3','Path_4','Path_5','Path_6','Path_7','Path_8'];

// fetch で読み込み
fetch('japan.svg')
  .then(res => res.text())
  .then(svgText => {
    const mapDiv = document.getElementById('map');
    mapDiv.innerHTML = svgText;

    // 初期 fill + イベント登録
    mapDiv.querySelectorAll('g[id^="Path_"] path').forEach(path=>{
      path.style.fill='#ADD8E6'; // 初期薄青
      path.style.stroke='#ffffff'; // 県境は白
      path.style.strokeWidth='1.5';
      path.style.strokeLinejoin='round';
      path.style.cursor='pointer';

      path.addEventListener('click', ()=>showRegionDetail(path.parentNode.id));
    });
  })
  .catch(err => console.error('SVG読み込みエラー:', err));

// クリック後：拡大表示・濃青・ラベル
function showRegionDetail(regionID){
  const mapDiv = document.getElementById('map');
  const svg = mapDiv.querySelector('svg');

  // 全県非表示
  svg.querySelectorAll('g[id^="Path_"] path').forEach(p=>p.style.display='none');

  // 選択地域だけ表示
  const group = svg.querySelector('#'+regionID);
  if(!group) return;

  group.querySelectorAll('path').forEach(p=>{
    p.style.display='block';
    p.style.fill='#191970'; // 濃青
    p.style.stroke='#ffffff';
    p.style.strokeWidth='1.5';
  });

  // 拡大 transform（自動計算）
  const bbox = group.getBBox();
  const svgWidth=900, svgHeight=600;
  const scale = Math.min(svgWidth/bbox.width, svgHeight/bbox.height);
  const tx = -bbox.x + (svgWidth - bbox.width*scale)/2/scale;
  const ty = -bbox.y + (svgHeight - bbox.height*scale)/2/scale;
  group.setAttribute('transform',`scale(${scale}) translate(${tx},${ty})`);

  // 県ラベルは一度だけ追加
  if(!group.querySelector('.region-label')){
    group.querySelectorAll('path').forEach(p=>{
      const bb = p.getBBox();
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',bb.x + bb.width/2);
      text.setAttribute('y',bb.y + bb.height/2);
      text.setAttribute('class','region-label');
      text.textContent = prefNames[p.id] || p.id;
      group.appendChild(text);
    });
  }
}
</script>

</body>

      }

  btn.textContent = '✖️';
  btn.className = 'delete-btn';
  li.appendChild(btn);
  locationList.appendChild(li);
  attachDeleteEvents();
}
function resetLocations(){ locationList.innerHTML = '<li class="location-none">登録なし</li>'; }

// ニュースオーバーレイ
// --------------------
const newsBtn = document.getElementById("newsBtn");
const overlay = document.getElementById("newsOverlay");
const closeBtn = document.getElementById("closeNews");
newsBtn.addEventListener("click", e=>{
  e.preventDefault();
  overlay.style.display="flex";
});
closeBtn.addEventListener("click", ()=>{ overlay.style.display="none"; });

// --------------------
// 地図（SVG）処理
// --------------------

// 都道府県 名称一覧（ラベル）
const prefNames = {
  hokkaido:'北海道',
  aomori:'青森県',
  iwate:'岩手県',
  miyagi:'宮城県',
  akita:'秋田県',
  yamagata:'山形県',
  fukushima:'福島県',
  // 必要な県を追加して下さい
};

  const mapDiv = document.getElementById('map');
  const svg = mapDiv.querySelector('svg');

  // 全県リセット
  svg.querySelectorAll('g[id^="Path_"]').forEach(g=>{
    g.querySelectorAll('path').forEach(p=>{
      p.style.display='block';
      p.style.fill='#ADD8E6'; // 初期薄青
      p.style.stroke='#ffffff';
      p.style.strokeWidth='1.5';
      g.removeAttribute('transform'); // transformリセット
