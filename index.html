
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>йҮЈгӮҠиЎҢгҒ“NAVI</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
background:#ffffff;
color:#333;
}

/* header */

header{
border-bottom:1px solid #ddd;
background:#fff;
}

.header-inner{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
}

.logo{
font-weight:bold;
font-size:16px;
color:#191970;
}

.nav{
display:flex;
gap:15px;
align-items:center;
}

.nav a{

}

/* accordion */

.accordion-wrapper{
position:relative;
}

.accordion-btn{
background:none;
border:none;
font-size:14px;
cursor:pointer;
}

.accordion-panel{
display:none;
position:absolute;
top:30px;
left:0;
background:#f9f9f9;
border:1px solid #ddd;
border-radius:4px;
padding:8px;
min-width:150px;
}

.location-list{
list-style:none;
padding:0;
margin:0;
}

.location-list li{
display:flex;
justify-content:space-between;
align-items:center;
padding:3px 0;
font-size:14px;
}

.delete-btn{
background:none;
border:none;
cursor:pointer;
color:#c00;
}

.location-none{
color:#888;
font-style:italic;
}

/* map */

main{
max-width:1100px;
margin:auto;
padding:20px;
}

.map{
text-align:center;
}

.japan-map{
width:100%;
max-width:900px;
margin:auto;
}

.japan-map img{
width:100%;
height:auto;
display:block;
}

/* ad */

.ad{
text-align:center;
margin:20px 0;
color:#999;
}

/* footer */

footer{
margin-top:40px;
padding:20px;
text-align:center;
font-size:13px;
color:#777;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">йҮЈгӮҠиЎҢгҒ“NAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">зҷ»йҢІең°зӮ№ в–ј</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>ж–°жҪҹ <button class="delete-btn">вң–пёҸ</button></li>
            <li>зҫӨйҰ¬ <button class="delete-btn">вң–пёҸ</button></li>
            <li>йЈҜеІЎжјҒжёҜ(еҚғи‘ү) <button class="delete-btn">вң–пёҸ</button></li>
          </ul>
        </div>
      </div>
      <a href="#">йҮЈгӮҠгғӢгғҘгғјгӮ№</a>
      <a href="#">е…ЁеӣҪең°еӣі</a>
      <a href="#">гҒқгҒ®д»–</a>
    </nav>
  </div>
</header>

<div class="ad">еәғе‘ҠгӮ№гғҡгғјгӮ№</div>

<main>
  <div class="map">
    <div class="japan-map">
      <img src="japan.svg" alt="ж—Ҙжң¬ең°еӣі">
    </div>
  </div>
</main>

<div class="ad">еәғе‘ҠгӮ№гғҡгғјгӮ№</div>

<footer>В© йҮЈгӮҠиЎҢгҒ“NAVI</footer>

<script>

// гӮўгӮігғјгғҮгӮЈгӮӘгғіеұ•й–Ӣ
const accordionBtn = document.querySelector('.accordion-btn');
const panel = document.querySelector('.accordion-panel');

accordionBtn.addEventListener('click', ()=>{
  document.querySelectorAll('.accordion-panel').forEach(p=>{
    if(p!==panel) p.style.display='none';
  });
  panel.style.display = (panel.style.display==='block') ? 'none':'block';
});

// гғҡгғјгӮёгӮҜгғӘгғғгӮҜгҒ§й–үгҒҳгӮӢ
document.addEventListener('click', e=>{
  if(!e.target.closest('.accordion-wrapper')){
    document.querySelectorAll('.accordion-panel').forEach(p=>p.style.display='none');
  }
});

// зҷ»йҢІең°зӮ№гғӘгӮ№гғҲ
const locationList = document.getElementById('locationList');

// ж—ўеӯҳгғ»ж–°иҰҸгҒ® вң–пёҸ гғңгӮҝгғігҒ«гӮӨгғҷгғігғҲгӮ’д»ҳдёҺ
function attachDeleteEvents() {
  const deleteButtons = locationList.querySelectorAll('.delete-btn');

  deleteButtons.forEach(btn=>{
    btn.addEventListener('click', e=>{
      const li = btn.parentElement;
      li.remove();

      if(locationList.children.length === 0){
        locationList.innerHTML = '<li class="location-none">зҷ»йҢІгҒӘгҒ—</li>';
      }
    });
  });
}

// еҲқжңҹгӮөгғігғ—гғ«
attachDeleteEvents();

// зҷ»йҢІең°зӮ№иҝҪеҠ 
function addLocation(name){

  const noneItem = locationList.querySelector('.location-none');
  if(noneItem) noneItem.remove();

  const li = document.createElement('li');
  li.textContent = name + ' ';

  const btn = document.createElement('button');
  btn.textContent = 'вң–пёҸ';
  btn.className = 'delete-btn';

  li.appendChild(btn);
  locationList.appendChild(li);

  attachDeleteEvents();
}

// гғӘгӮ№гғҲгғӘгӮ»гғғгғҲ
function resetLocations(){
  locationList.innerHTML = '<li class="location-none">зҷ»йҢІгҒӘгҒ—</li>';
}

</script>

</body>
