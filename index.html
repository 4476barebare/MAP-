<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣りマップ</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue";
background:#f4f7fb;
text-align:center;
}

h1{
margin:20px;
color:#222;
}

#map{
width:95%;
max-width:900px;
margin:auto;
}

#map svg{
width:100%;
height:auto;
}

#map path{
fill:#6f8fb8;
stroke:white;
stroke-width:0.7;
cursor:pointer;
transition:0.2s;
}

#map path:hover{
fill:#3f6fa6;
}

</style>
</head>


<body>

<h1>釣りマップ</h1>

<div id="map"></div>

<script>

fetch("japan.svg")
.then(res => res.text())
.then(svg => {

document.getElementById("map").innerHTML = svg

const prefs = document.querySelectorAll("#map path")

prefs.forEach(pref => {

pref.addEventListener("click", () => {

const id = pref.id

location.href = "map.html?pref=" + id

})

})

})

</script>

</body>
