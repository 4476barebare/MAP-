<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>
<!-- ヘッダー用 CSS -->
<link rel="stylesheet" href="header.css">
<!-- コンテンツ用 CSS -->
<style>
html, body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff;
  color:#333;
  overflow-x: hidden;
}
main { max-width:1100px; margin:auto; padding:20px; }
.map { text-align:center; }
.japan-map { width:100%; max-width:900px; margin:0 auto; filter:drop-shadow(0 3px 5px rgba(0,0,0,0.22)); }
.japan-map svg { width:100%; height:auto; }
.ad { text-align:center; margin:20px 0; color:#999; }
footer { margin-top:40px; padding:20px; text-align:center; font-size:13px; color:#777; border-top:1px solid #ddd; }

#map {
  position: relative;
  width: 100%;
  min-height: 420px; /* ★これが重要 */
  z-index: 50;
}


#map svg {
  width: 100%;
  height: auto;
  display: block;
}

#map > div {   /* ダミーBOXや初期ナビ */
  z-index: 10; /* ここは JS 側と合わせる */
}


</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<main>
  <div class="map">
    <div class="japan-map" id="map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>
<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイは header.js が制御 -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- ヘッダー JS -->
<script src="header.js"></script>
<!-- 地図処理 JS -->
<script src="map.js"></script>

</body>
</html>
