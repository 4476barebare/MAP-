  integrity="sha256-sA+e2UfM2M4u7dHMBk2sPtyb4Y4I/6b0o+N/m0qMCXk="
  crossorigin=""
/>

<style>
html, body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; background:#fff; color:#333; overflow-x:hidden; }

.pref-box { background:#fff; padding:4px 8px; border-radius:4px; cursor:pointer; user-select:none; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<header>

<div class="ad">広告スペース</div>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-vw26f91ue5K4Y/wCjx2c0Dxq0MYN6fBR0rKJtYngsBM="
  crossorigin="">
</script>

<!-- Map JS -->
<script src="map.js"></script>

<script>
// ★ index側で呼び出す関数例（Leaflet表示用）
// map.js 内で handlePrefClick(prefId) が Leaflet起動
// 県IDを #KANTO/CHIBA 形式で URL に反映させている場合、ここで追加処理可
function showLeafletForHash() {
  const hash = location.hash.replace('#','').toUpperCase();
  const parts = hash.split('/');
  const prefId = parts[1] || null;
  if(prefId && window.switchToLeaflet) {
    window.switchToLeaflet(prefId);
  }
}

// ページロード時の Leaflet 起動判定
window.addEventListener('DOMContentLoaded', () => {
  if(location.hash.includes('/')) showLeafletForHash();
});
</script>

</body>
