<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<style>
/* ======================
基本設定
====================== */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}
html{ font-size:16px; -webkit-text-size-adjust:100%; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff;
  color:#222;
  overflow-x:hidden;
}

/* ======================
ヘッダー
====================== */
header{
  background:#ffffff;
  border-bottom:1px solid #e5e5e5;
}

.header-inner{
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
}

.logo{
  font-weight:700;
  font-size:0.8rem; /* ヘッダー他項目と同じサイズ */
  color:#3f6fa5;    /* タイトル・地図と同色 */
  white-space:nowrap;
}

.nav{
  display:flex;
  align-items:flex-start;
  gap:14px;
}

/* アコーディオン部分 */
.accordion {
  position: relative;
}

.accordion-btn {
  background: none;
  border: none;
  font-size:0.8rem;
  color:#333;
  cursor:pointer;
  padding:0;
}

.accordion-btn:hover { color:#3f6fa5; }

.accordion-panel {
  display: none;
  background:#f9f9f9;
  margin-top:4px;
  border:1px solid #e5e5e5;
  border-radius:4px;
  padding:4px 8px;
}

.location-list {
  list-style:none;
  padding-left:0;
  margin:0;
}

.location-list li {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2px 0;
  font-size:0.8rem;
}

.delete-btn {
  background:none;
  border:none;
  color:#c00;
  cursor:pointer;
  font-size:0.8rem;
}
.delete-btn:hover { color:#f00; }

.nav a{
  text-decoration:none;
  color:#333;
  font-size:0.8rem;
  white-space:nowrap;
}
.nav a:hover { color:#3f6fa5; }

/* ======================
メイン
====================== */
main{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* ======================
地図
====================== */
.map{ text-align:center; }
.japan-map{
  width:100%;
  max-width:900px;
  height:520px;
  margin:auto;
  background:#3f6fa5; /* タイトルと同色 */
  mask:url("japan.svg") no-repeat center;
  mask-size:contain;
  -webkit-mask:url("japan.svg") no-repeat center;
  -webkit-mask-size:contain;
}

/* ======================
広告
====================== */
.ad{ text-align:center; margin:20px 0; color:#999; }

/* ======================
フッター
====================== */
footer{
  margin-top:40px;
  padding:20px;
  text-align:center;
  font-size:0.8rem;
  color:#666;
  border-top:1px solid #e5e5e5;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list">
            <li>
              新潟
              <button class="delete-btn">✖️</button>
            </li>
            <li>
              群馬
              <button class="delete-btn">✖️</button>
            </li>
            <li>
              飯岡漁港(千葉)
              <button class="delete-btn">✖️</button>
            </li>
          </ul>
        </div>
      </div>
      <a href="#">釣りニュース</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<div class="ad">広告スペース</div>

<main>
  <div class="map">
    <div class="japan-map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>

<footer>© 釣り行こNAVI</footer>

<script>
// アコーディオン展開
document.querySelectorAll('.accordion-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const panel = btn.nextElementSibling;
    panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
  });
});

// 削除ボタン処理
document.querySelectorAll('.delete-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const li = btn.closest('li');
    li.remove();
  });
});
</script>

</body>
</html>
