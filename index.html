<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣り行こナビ</title>

<style>

/* ===== 基本 ===== */

{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
background:#f5f7fa;
}


/ ===== ヘッダー ===== /

header{

position:sticky;
top:0;

display:flex;
align-items:center;
justify-content:space-between;

padding:10px;

background:white;
border-bottom:1px solid #ddd;

}


/ ロゴ /

.logo{

font-weight:bold;
font-size:18px;
color:#007aff;

}


/ ナビ /

.nav{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.nav a{

text-decoration:none;
color:#333;
font-size:14px;

}


/ ===== メイン ===== /

main{

padding:10px;

}


/ ===== 地図 ===== /

.map-container{

max-width:900px;
margin:auto;

}

.map-container img{

width:100%;
height:auto;
display:block;

}


/ ===== フッター ===== */

footer{

margin-top:30px;
padding:15px;

text-align:center;
font-size:12px;

color:#666;

border-top:1px solid #ddd;
background:white;

}

</style>

</head>


<body>


<header>

<div class="logo">
釣り行こナビ
</div>

<nav class="nav">

<a href="#">登録地点</a>
<a href="#">釣りニュース</a>
<a href="#">全国地図</a>
<a href="#">その他</a>

</nav>

</header>



<main>

<div class="map-container">

<img src="japan.svg">

</div>

</main>



<footer>

© 2026 釣り行こナビ

</footer>


</body>
