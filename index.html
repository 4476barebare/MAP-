<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<style>
/* 全体リセット */
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; background:#fff; color:#222; overflow-x:hidden; }
header, main, footer { width:100%; }
main { padding:20px; max-width:1100px; margin:auto; }

/* ヘッダー */
header { background:#fff; border-bottom:1px solid #e5e5e5; }
.header-inner { max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; }
.logo { font-weight:700; font-size:0.8rem; color:#191970; white-space:nowrap; }
.nav { display:flex; align-items:center; gap:14px; }

/* アコーディオン */
.accordion-wrapper { position:relative; }
.accordion-btn { background:none; border:none; font-size:0.8rem; color:#333; cursor:pointer; }
.accordion-btn:hover { color:#191970; }
.accordion-panel {
  display:none; position:absolute; top:100%; left:0; background:#f9f9f9;
  border:1px solid #e5e5e5; border-radius:4px; padding:4px 8px; min-width:150px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1); z-index:10;
}
.location-list { list-style:none; padding-left:0; margin:0; }
.location-list li { display:flex; justify-content:space-between; align-items:center; padding:2px 0; font-size:0.8rem; }
.delete-btn { background:none; border:none; color:#c00; cursor:pointer; font-size:0.8rem; }
.delete-btn:hover { color:#f00; }
.location-none { font-style:italic; color:#999; }

/* ヘッダーリンク */
.nav a { text-decoration:none; color:#333; font-size:0.8rem; white-space:nowrap; }
.nav a:hover { color:#191970; }

/* 広告 */
.ad { text-align:center; margin:20px 0; color:#999; }

/* フッター */
footer { margin-top:40px; padding:20px; text-align:center; font-size:0.8rem; color:#666; border-top:1px solid #e5e5e5; }

/* 地図コンテナ */
.map { display:flex; justify-content:center; align-items:center; width:100%; height:80vh; background:#191970; }
.japan-map {
  width:100%;
  max-width:1200px;
  height:100%;
  mask: url("japan.svg") no-repeat center;
  mask-size: contain;
  -webkit-mask: url("japan.svg") no-repeat center;
  -webkit-mask-size: contain;
  background-color:#00f; /* SVGの見え方を確認 */
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#">釣りニュース</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<div class="ad">広告スペース</div>

<main>
  <div class="map">
    <div class="japan-map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>

<footer>© 釣り行こNAVI</footer>

<script>
// アコーディオン展開
const accordionBtn = document.querySelector('.accordion-btn');
const panel = document.querySelector('.accordion-panel');
accordionBtn.addEventListener('click', ()=>{
  document.querySelectorAll('.accordion-panel').forEach(p=>{
    if(p!==panel) p.style.display='none';
  });
  panel.style.display = (panel.style.display==='block') ? 'none':'block';
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.accordion-wrapper')){
    document.querySelectorAll('.accordion-panel').forEach(p=>p.style.display='none');
  }
});

// 登録地点リスト
const locationList = document.getElementById('locationList');
function attachDeleteEvents() {
  locationList.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const li = btn.parentElement; li.remove();
      if(locationList.children.length === 0){
        locationList.innerHTML = '<li class="location-none">登録なし</li>';
      }
    });
  });
}
attachDeleteEvents();
function addLocation(name){
  const noneItem = locationList.querySelector('.location-none');
  if(noneItem) noneItem.remove();
  const li = document.createElement('li');
  li.textContent = name + ' ';
  const btn = document.createElement('button');
  btn.textContent = '✖️'; btn.className='delete-btn';
  li.appendChild(btn);
  locationList.appendChild(li);
  attachDeleteEvents();
}
function resetLocations(){
  locationList.innerHTML = '<li class="location-none">登録なし</li>';
}
</script>

</body>
</html>
