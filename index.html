
<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣り行こナビ</title>

<style>

/* =========================
基本リセット
========================= */

*{
box-sizing:border-box;
margin:0;
padding:0;
}


/* =========================
HTML基本設定
========================= */

html{

font-size:16px;

-webkit-text-size-adjust:100%;

}


/* =========================
body
========================= */

body{

font-family:
-apple-system,
BlinkMacSystemFont,
"Helvetica Neue",
Arial,
sans-serif;

line-height:1.5;

color:#222;

background:#ffffff;

overflow-x:hidden;

}


/* =========================
ヘッダー
========================= */

header{

background:#ffffff;

border-bottom:1px solid #e5e5e5;

position:sticky;

top:0;

z-index:1000;

}


/* ヘッダー内部 */

.header-inner{

display:flex;

align-items:center;

justify-content:space-between;

padding:12px 16px;

max-width:1100px;

margin:auto;

}


/* ロゴ */

.logo a{

text-decoration:none;

font-weight:700;

font-size:1.2rem;

color:#007aff;

}


/* ナビ */

.nav{

display:flex;

gap:18px;

}


/* ナビリンク */

.nav a{

text-decoration:none;

color:#333;

font-size:clamp(0.8rem,2vw,0.9rem);

white-space:nowrap;

}


.nav a:hover{

color:#007aff;

}


/* =========================
メイン
========================= */

main{

max-width:1100px;

margin:auto;

padding:20px;

}


/* =========================
地図
========================= */

.map-container{

width:100%;

text-align:center;

}


.map-container img{

width:100%;

max-width:900px;

height:auto;

}


/* =========================
広告
========================= */

.ad{

margin:20px auto;

text-align:center;

}


/* =========================
フッター
========================= */

footer{

margin-top:40px;

padding:20px;

text-align:center;

font-size:0.8rem;

color:#666;

border-top:1px solid #e5e5e5;

}

</style>

</head>


<body>


<!-- =========================
ヘッダー
========================= -->

<header>

<div class="header-inner">

<div class="logo">
<a href="#">釣り行こナビ</a>
</div>

<nav class="nav">

<a href="#">登録地点</a>

<a href="#">釣りニュース</a>

<a href="#">全国地図</a>

<a href="#">その他</a>

</nav>

</div>

</header>


<!-- =========================
広告
========================= -->

<div class="ad">

広告スペース

</div>


<!-- =========================
メイン
========================= -->

<main>

<div class="map-container">

<img src="japan.svg" alt="日本地図">

</div>

</main>


<!-- =========================
広告
========================= -->

<div class="ad">

広告スペース

</div>


<!-- =========================
フッター
========================= -->

<footer>

© 釣り行こナビ

</footer>


</body>

</html>
