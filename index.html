<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<!-- ヘッダー用 CSS -->
<link rel="stylesheet" href="header.css">
<!-- Map専用 CSS -->
<link rel="stylesheet" href="map.css">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

main {
  background-color: #191970;
  max-width: 100%;
  margin: 0;
  padding: 0;
}

.map {
  text-align: center;
  height: 600px; /* 元のマップ高さに合わせる */
}

/* Leaflet専用 */
#leafletMap {
  width: 100%;
  height: 100%;
}

.leaflet-container-custom {
  z-index: 0; /* 元のSVGやBOXの上に被らないように */
}

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<main>
  <div class="map">
    <!-- Leaflet専用マップ -->
    <div id="leafletMap" class="leaflet-container-custom"></div>
  </div>
</main>

<div class="ad">広告スペース</div>
<footer>© 釣り行こNAVI</footer>

<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="header.js"></script>
<script src="map.js"></script>

<script>
// Leaflet初期化
const leafletMap = L.map('leafletMap').setView([36.0, 139.0], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(leafletMap);

// 千葉県ズーム関数
function zoomToChiba() {
    const chibaLatLng = [35.607, 140.106];
    leafletMap.setView(chibaLatLng, 9);
}

// デバッグ用ボタン
document.addEventListener('DOMContentLoaded', () => {
    const mapContainer = document.getElementById('leafletMap');
    const chibaBtn = document.createElement('button');
    chibaBtn.textContent = '千葉県を表示';
    chibaBtn.style.position = 'absolute';
    chibaBtn.style.top = '10px';
    chibaBtn.style.left = '10px';
    chibaBtn.style.zIndex = '1000';
    chibaBtn.onclick = zoomToChiba;
    mapContainer.appendChild(chibaBtn);
});
</script>

</body>
</html>
