<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>釣りマップ</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f4f7fb;
text-align:center;
}

h1{
margin:20px;
color:#222;
}

#map{
width:95%;
max-width:900px;
margin:auto;
}

svg{
width:100%;
height:auto;
}

path{
fill:#6f8fb8;
stroke:#ffffff;
stroke-width:0.7;
transition:0.2s;
}

.region-hover path{
fill:#3f6fa6;
cursor:pointer;
}

</style>
</head>

<body>

<h1>釣りマップ</h1>

<div id="map"></div>

<script>

fetch("japan.svg")
.then(res=>res.text())
.then(svg=>{

document.getElementById("map").innerHTML=svg

const regions={

hokkaido:["JP01"],

tohoku:["JP02","JP03","JP04","JP05"],

kitaKanto:["JP07","JP08","JP09","JP12"],

kantoHokuriku:["JP10","JP11","JP13","JP14","JP15","JP16","JP17","JP19"],

chubu:["JP20","JP21","JP22","JP23"],

kansai:["JP18","JP24","JP25","JP26","JP27","JP29","JP30"],

chugokuShikoku:[
"JP28","JP31","JP32","JP33","JP34",
"JP35","JP36","JP37","JP38","JP39"
],

kyushu:["JP40","JP41","JP42","JP43","JP45","JP46"],

okinawa:["JP47"]

}

for(const region in regions){

regions[region].forEach(pref=>{

const el=document.getElementById(pref)

if(!el) return

el.addEventListener("mouseover",()=>{

regions[region].forEach(p=>{
const e=document.getElementById(p)
if(e) e.classList.add("region-hover")
})

})

el.addEventListener("mouseout",()=>{

regions[region].forEach(p=>{
const e=document.getElementById(p)
if(e) e.classList.remove("region-hover")
})

})

el.addEventListener("click",()=>{

location.href="map.html?region="+region

})

})

}

})

</script>

</body>
