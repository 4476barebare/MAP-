
<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣り行こナビ</title>

<style>

/* ===== 基本設定 ===== */

{
box-sizing:border-box;
}

html{
font-size:16px;
-webkit-text-size-adjust:100%;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
background:#f5f7fa;
color:#222;
overflow-x:hidden;
}


/ ===== ヘッダー ===== /

header{

position:sticky;
top:0;

display:flex;
align-items:center;
justify-content:space-between;

padding:10px 12px;

background:#ffffff;
border-bottom:1px solid #e5e5e5;

z-index:1000;

}


/ ロゴ /

.logo a{

text-decoration:none;
color:#007aff;
font-weight:700;

font-size:1.2rem;

}


/ ナビ /

.nav{

display:flex;
gap:14px;

}

.nav a{

text-decoration:none;
color:#333;

font-weight:500;

font-size:clamp(0.75rem,2.3vw,0.9rem);

white-space:nowrap;

}


/ ===== メイン ===== /

main{

padding:12px;

}


/ ===== 地図コンテナ ===== /

.map-container{

width:100%;
max-width:1000px;

margin:0 auto;

}


/ ===== SVG地図 ===== /

svg{

width:100%;
height:auto;

}


/ ===== 地図ホバー ===== /

.region:hover{

opacity:0.8;
cursor:pointer;

}


/ ===== フッター ===== */

footer{

margin-top:30px;
padding:20px 10px;

background:#ffffff;
border-top:1px solid #e5e5e5;

text-align:center;

font-size:0.8rem;
color:#666;

}

</style>

</head>

<body>


<header>

<div class="logo">
<a href="#">釣り行こナビ</a>
</div>

<nav class="nav">
<a href="#">登録地点</a>
<a href="#">釣りニュース</a>
<a href="#">全国地図</a>
<a href="#">その他</a>
</nav>

</header>



<main>

<div class="map-container">

<object id="japanMap" type="image/svg+xml" data="japan.svg"></object>

</div>

</main>



<footer>

© 2026 釣り行こナビ

</footer>



<script>

document.getElementById("japanMap").addEventListener("load", function(){

const svgDoc = this.contentDocument;

const regions = svgDoc.querySelectorAll(".region");

regions.forEach(region => {

region.addEventListener("click", function(){

const name = this.id;

location.href = "map.html?region=" + name;

});

});

});

</script>


</body>
</html>
