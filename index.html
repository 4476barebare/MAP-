<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>
<link rel="stylesheet" href="header.css">
<style>
/* 地図周りの最低限のCSS */
#map-container {
  position: relative;
  width: 100%;
  height: 600px;
  overflow: hidden;
}

svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点</button>
        <div class="accordion-panel">
          <ul id="locationList">
            <li class="location-none">登録なし</li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">ニュース</a>
    </nav>
  </div>
</header>

<div id="map-container">
  <!-- 日本地図 SVG をここに埋め込む -->
  <svg id="japanMap" viewBox="0 0 900 600">
    <!-- Path_1 ~ Path_8 の地域グループをここに -->
  </svg>
</div>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content">
      <!-- RSSやニュース表示予定 -->
    </div>
  </div>
</div>

<script src="header.js"></script>
<script>
// --------------------
// 地図操作スクリプト例
// --------------------
const prefNames = {
  Path_1:'北海道',
  Path_2:'東北',
  Path_3:'関東',
  Path_4:'中部',
  Path_5:'近畿',
  Path_6:'四国・中国',
  Path_7:'九州',
  Path_8:'沖縄'
};

function showRegionDetail(regionID){
  const svg = document.getElementById('japanMap');
  svg.querySelectorAll('g[id^="Path_"]').forEach(g=>{
    g.style.display='block';
    g.querySelectorAll('path').forEach(p=>{
      p.style.fill='#ADD8E6';
      p.style.stroke='#ffffff';
      p.style.strokeWidth='1.5';
    });
  });

  const group = svg.querySelector('#'+regionID);
  if(!group) return;

  group.querySelectorAll('path').forEach(p=>{
    p.style.fill='#191970';
  });

  // 各県名表示
  if(!group.querySelector('.region-label')){
    group.querySelectorAll('path').forEach(p=>{
      const bb = p.getBBox();
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',bb.x+bb.width/2);
      text.setAttribute('y',bb.y+bb.height/2);
      text.setAttribute('class','region-label');
      text.setAttribute('text-anchor','middle');
      text.setAttribute('alignment-baseline','middle');
      text.style.fill='#fff';
      text.style.fontSize='12px';
      text.textContent = prefNames[p.id] || p.id;
      group.appendChild(text);
    });
  }
}

// 例: 地図クリック時
document.getElementById('japanMap').addEventListener('click', e=>{
  let region = e.target.closest('g[id^="Path_"]');
  if(region) showRegionDetail(region.id);
});
</script>
</body>
</html>
