<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日本釣りマップ</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:#ffffff;
color:#1d1d1f;
}

header{
text-align:center;
padding:40px 20px;
font-size:32px;
font-weight:600;
}

.subtitle{
text-align:center;
color:#6e6e73;
margin-top:-10px;
margin-bottom:40px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.map-card{
background:#f5f7fb;
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.map-card img{
width:100%;
max-width:700px;
cursor:pointer;
}

.ad{
margin:40px 0;
padding:30px;
background:#f2f2f2;
text-align:center;
border-radius:12px;
color:#999;
font-size:14px;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:40px;
}

.feature{
background:#f8f9fb;
padding:25px;
border-radius:16px;
text-align:center;
}

.feature h3{
margin:10px 0;
font-size:18px;
color:#0A84FF;
}

footer{
text-align:center;
margin:60px 0;
color:#6e6e73;
font-size:14px;
}

</style>

</head>

<body>

<header>
日本釣りマップ
</header>

<div class="subtitle">
釣り場・トイレ・コンビニ・釣具店を探す
</div>

<div class="container">

<div class="map-card">

<p>地域を選択してください</p>

<img src="japan_map.svg" onclick="location.href='region.html'">

</div>

<div class="ad">
広告スペース
</div>

<div class="features">

<div class="feature">
<h3>🎣 釣り場</h3>
<p>堤防・サーフ・港などの釣りポイント</p>
</div>

<div class="feature">
<h3>🚻 トイレ</h3>
<p>近くの公衆トイレを表示</p>
</div>

<div class="feature">
<h3>🏪 コンビニ</h3>
<p>食料や氷を買える場所</p>
</div>

<div class="feature">
<h3>🎣🏬 釣具店</h3>
<p>近くの釣具店</p>
</div>

</div>

</div>

<footer>
© 日本釣りマップ
</footer>

</body>
</html>
