<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>
<style>
html, body {
  margin: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #ffffff;
  color: #333;
}
header {
  border-bottom: 1px solid #191970;
  background: #fff;
}
.header-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  position: relative;
  z-index: 1;
}
.logo {
  font-weight: 700;
  font-size: 0.8rem;
  color: #191970;
  display: flex;
  align-items: center;
}
.nav {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav a {
  text-decoration: none;
  color: #191970;
  font-size: 0.8rem;
}
.accordion-wrapper {
  position: relative;
}
.accordion-btn {
  background: none;
  border: none;
  font-size: 0.8rem;
  color: #191970;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.accordion-panel {
  display: none;
  position: absolute;
  top: 30px;
  left: 0;
  background: #f9f9f9;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 8px;
  min-width: 150px;
}
.location-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.location-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 14px;
}
.delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #c00;
}
.location-none {
  color: #888;
  font-style: italic;
}
main {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}
.map {
  text-align: center;
}
.japan-map {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.22));
}
.japan-map svg {
  width: 100%;
  height: auto;
}
.japan-map path {
  fill: #191970;
  stroke: #191970;
  stroke-width: 0.5;
}
.ad {
  text-align: center;
  margin: 20px 0;
  color: #999;
}
footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  font-size: 13px;
  color: #777;
  border-top: 1px solid #ddd;
}
#newsOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.news-window {
  position: relative;
  width: 85%;
  max-width: 900px;
  height: 70vh;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
</style>
</head>
<body>
<header>
<div class="header-inner">
<div class="logo">釣り行こNAVI</div>
<nav class="nav">
<div class="accordion-wrapper">
<button class="accordion-btn">登録地点 ▼</button>
<div class="accordion-panel">
<ul class="location-list" id="locationList">
<li>新潟 <button class="delete-btn">✖️</button></li>
<li>群馬 <button class="delete-btn">✖️</button></li>
<li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
</ul>
</div>
</div>
<a href="#" id="newsBtn">釣りNEWS</a>
<a href="#">全国地図</a>
<a href="#">その他</a>
</nav>
</div>
</header>
<main>
<div class="map">
<div class="japan-map" id="map">
</div>
</div>
</main>
<div class="ad">広告スペース</div>
<footer>© 釣り行こNAVI</footer>
<div id="newsOverlay">
<div class="news-window">
<button id="closeNews">閉じる</button>
<div class="news-content">
</div>
</div>
</div>
<script>
// アコーディオン処理
const accordionBtn = document.querySelector('.accordion-btn');
const panel = document.querySelector('.accordion-panel');
accordionBtn.addEventListener('click', ()=>{
 document.querySelectorAll('.accordion-panel').forEach(p=>{
 if(p!==panel) p.style.display='none';
 });
 panel.style.display = (panel.style.display==='block') ? 'none':'block';
});
document.addEventListener('click', e=>{
 if(!e.target.closest('.accordion-wrapper')){
 document.querySelectorAll('.accordion-panel').forEach(p=>p.style.display='none');
 }
});
// 登録地点操作
const locationList = document.getElementById('locationList');
function attachDeleteEvents() {
 const deleteButtons = locationList.querySelectorAll('.delete-btn');
 deleteButtons.forEach(btn=>{
 btn.addEventListener('click', e=>{
 const li = btn.parentElement;
 li.remove();
 if(locationList.children.length === 0){
 locationList.innerHTML = '<li class="location-none">登録なし</li>';
 }
 });
 });
}
attachDeleteEvents();
function addLocation(name){
 const noneItem = locationList.querySelector('.location-none');
 if(noneItem) noneItem.remove();
 const li = document.createElement('li');
 li.textContent = name + ' ';
 const btn = document.createElement('button');
 btn.textContent = '✖️';
 btn.className = 'delete-btn';
 li.appendChild(btn);
 locationList.appendChild(li);
 attachDeleteEvents();
}
function resetLocations(){
 locationList.innerHTML = '<li class="location-none">登録なし</li>';
}
// ニュースオーバーレイ
const newsBtn = document.getElementById("newsBtn");
const overlay = document.getElementById("newsOverlay");
const closeBtn = document.getElementById("closeNews");
newsBtn.addEventListener("click", e=>{
 e.preventDefault();
 overlay.style.display="flex";
});
closeBtn.addEventListener("click", ()=>{
 overlay.style.display="none";
});

fetch('japan.svg')
  .then(res => res.text())
  .then(svgText => {
    const mapDiv = document.getElementById('map');
    mapDiv.innerHTML = svgText;

    const groups = mapDiv.querySelectorAll('g[id$="_group"]');
groups.forEach(group => {
  group.querySelectorAll('path').forEach(path => {
    path.setAttribute('stroke', '#ffffff'); // 線色
    path.setAttribute('stroke-width', '2'); // 線幅
    path.setAttribute('stroke-linejoin', 'round'); // 角丸
  });
});
  })
  .catch(err => console.error('SVG読み込みエラー:', err));

</script>
</body>
</html>
