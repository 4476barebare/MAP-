<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<style>
html, body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:#fff;
  color:#333;
  overflow-x: hidden;
}
header {
  position: fixed;
  top: 0; left: 0; width: 100%;
  z-index: 1000;
  border-bottom: 1px solid #191970;
  background: #fff;
}
.header-inner {
  max-width: 1100px; margin: auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; position: relative; z-index:1;
}
.logo { font-weight:700; font-size:0.8rem; color:#191970; display:flex; align-items:center; }
.nav { display:flex; align-items:center; gap:14px; }
.nav a { text-decoration:none; color:#191970; font-size:0.8rem; }
.accordion-wrapper { position:relative; }
.accordion-btn { background:none; border:none; font-size:0.8rem; color:#191970; cursor:pointer; display:flex; align-items:center; }
.accordion-panel { display:none; position:absolute; top:30px; left:0; background:#f9f9f9; border:1px solid #ddd; border-radius:4px; padding:8px; min-width:150px; }
.location-list { list-style:none; padding:0; margin:0; }
.location-list li { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:14px; }
.delete-btn { background:none; border:none; cursor:pointer; color:#c00; }
.location-none { color:#888; font-style:italic; }

main { padding-top: 60px; }
.map { text-align:center; }
.japan-map { width:100%; max-width:900px; margin:0 auto; filter:drop-shadow(0 3px 5px rgba(0,0,0,0.22)); position:relative; }
.japan-map svg { width:100%; height:auto; }
.region-label { font-size:14px; font-weight:bold; fill:#000; text-anchor:middle; pointer-events:none; }
footer { margin-top:40px; padding:20px; text-align:center; font-size:13px; color:#777; border-top:1px solid #ddd; }

#newsOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.55); display:none;
  justify-content:center; align-items:center; z-index:999;
}
.news-window {
  position:relative; width:85%; max-width:900px; height:70vh;
  background:#fff; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
  overflow:hidden; display:flex; flex-direction:column;
}
</style>
</head>

<body>

<header>
<div class="header-inner">
  <div class="logo">釣り行こNAVI</div>
  <nav class="nav">
    <div class="accordion-wrapper">
      <button class="accordion-btn">登録地点 ▼</button>
      <div class="accordion-panel">
        <ul class="location-list" id="locationList">
          <li>新潟 <button class="delete-btn">✖️</button></li>
          <li>群馬 <button class="delete-btn">✖️</button></li>
          <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
        </ul>
      </div>
    </div>
    <a href="#" id="newsBtn">釣りNEWS</a>
    <a href="#">全国地図</a>
    <a href="#">その他</a>
  </nav>
</div>
</header>

<main>
  <div class="map">
    <div class="japan-map" id="map"></div>
  </div>
</main>

<footer>© 釣り行こNAVI</footer>

<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<script>
// アコーディオン
const accordionBtn = document.querySelector('.accordion-btn');
const panel = document.querySelector('.accordion-panel');
accordionBtn.addEventListener('click', ()=>{
  panel.style.display = (panel.style.display==='block') ? 'none':'block';
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.accordion-wrapper')) panel.style.display='none';
});

// 登録地点削除
const locationList = document.getElementById('locationList');
function attachDeleteEvents() {
  locationList.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const li = btn.parentElement; li.remove();
      if(locationList.children.length===0) locationList.innerHTML='<li class="location-none">登録なし</li>';
    });
  });
}
attachDeleteEvents();

// ニュースオーバーレイ
const newsBtn = document.getElementById("newsBtn");
const overlay = document.getElementById("newsOverlay");
const closeBtn = document.getElementById("closeNews");
newsBtn.addEventListener("click", e=>{ e.preventDefault(); overlay.style.display="flex"; });
closeBtn.addEventListener("click", ()=>{ overlay.style.display="none"; });

// 都道府県ラベル
const prefNames = { hokkaido:'北海道', aomori:'青森県', iwate:'岩手県', miyagi:'宮城県', akita:'秋田県', yamagata:'山形県', fukushima:'福島県' };

// SVG objectロード後
const obj = document.getElementById('japanMapObj');
obj.addEventListener('load', ()=>{
  const svgDoc = obj.contentDocument;
  const paths = svgDoc.querySelectorAll('g[id^="Path_"] path');

  paths.forEach(path=>{
    path.style.fill = '#ADD8E6'; // 初期薄青
    path.style.stroke = '#ffffff';
    path.style.strokeWidth = '1.5';
    path.style.strokeLinejoin = 'round';
    path.style.cursor = 'pointer';

    path.addEventListener('click', ()=>showRegionDetail(path.parentNode.id, svgDoc));
  });
});

// クリック後表示
function showRegionDetail(regionID, svgDoc){
  const paths = svgDoc.querySelectorAll('g[id^="Path_"] path');
  paths.forEach(p=>p.style.display='none');

  const group = svgDoc.querySelector('#'+regionID);
  if(!group) return;

  group.querySelectorAll('path').forEach(p=>{
    p.style.display='block';
    p.style.fill='#191970';
    p.style.stroke='#ffffff';
    p.style.strokeWidth='1.5';
  });

  const bbox = group.getBBox();
  const svgWidth=900, svgHeight=600;
  const scale = Math.min(svgWidth/bbox.width, svgHeight/bbox.height);
  const tx = -bbox.x + (svgWidth-bbox.width*scale)/2/scale;
  const ty = -bbox.y + (svgHeight-bbox.height*scale)/2/scale;
  group.setAttribute('transform',`scale(${scale}) translate(${tx},${ty})`);

  // ラベル
  if(!group.querySelector('.region-label')){
    group.querySelectorAll('path').forEach(p=>{
      const bb = p.getBBox();
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',bb.x+bb.width/2);
      text.setAttribute('y',bb.y+bb.height/2);
      text.setAttribute('class','region-label');
      text.textContent = prefNames[p.id]||p.id;
      group.appendChild(text);
    });
  }
}

</script>
</body>
</html>
