<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>
<link rel="stylesheet" href="header.css">
<style>
/* 地図周りの最低限のCSS */
#map-container {
  position: relative;
  width: 100%;
  height: 600px;
  overflow: hidden;
}

svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点</button>
        <div class="accordion-panel">
          <ul id="locationList">
            <li class="location-none">登録なし</li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">ニュース</a>
    </nav>
  </div>
</header>

<div id="map-container">
  <!-- 日本地図 SVG をここに埋め込む -->
  <svg id="japanMap" viewBox="0 0 900 600">
    <!-- Path_1 ~ Path_8 の地域グループをここに -->
  </svg>
</div>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content">
      <!-- RSSやニュース表示予定 -->
    </div>
  </div>
</div>



<script src="header.js"></script>
</body>
</html>
