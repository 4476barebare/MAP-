<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<!-- ヘッダー用 CSS -->
<link rel="stylesheet" href="header.css">
<!-- Map専用 CSS -->
<link rel="stylesheet" href="map.css">

<style>
/* html・body の全体設定はここに残す */
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

main {
  max-width: 100%;
  margin: 0;
  padding: 0;
}

.map {
  text-align: center;
}

#newsTicker {
  position: relative;
  width: 100%;
  height: 28px;
  overflow: hidden;
  background: #191970;
  color: #ffffff;
  font-size: 14px;
  line-height: 28px;
  white-space: nowrap;
}

#newsTicker .ticker-track {
  display: inline-block;
  white-space: nowrap;
  animation: tickerLoop 15s linear infinite;
}

#newsTicker .ticker-item {
  display: inline-block;
  padding-right: 50px; /* テキスト間のスペース */
}

@keyframes tickerLoop {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); } /* 半分ずらすだけでループ */
}

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<!-- ニュースフィーダー -->
<div id="newsTicker">
  <div class="ticker-track">
    <span class="ticker-item">今はテストのニュースです。釣果情報や台風情報などを流す予定です。 ● </span>
    <span class="ticker-item">今はテストのニュースです。釣果情報や台風情報などを流す予定です。 ● </span>
  </div>
</div

<main>
  <div class="map">
    <div class="japan-map" id="map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>
<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- JS -->
<script src="header.js"></script>
<script src="map.js"></script>

</body>
</html>
