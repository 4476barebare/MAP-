<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>釣り行こNAVI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #ffffff;
  color: #333;
}

/* ヘッダー */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid #e5e5e5;
  background: #ffffff;
}

.logo {
  font-size: 1rem;
  font-weight: 600;
  color: #2f6fb4;
}

nav {
  display: flex;
  gap: 18px;
  font-size: 0.95rem;
}

nav a {
  text-decoration: none;
  color: #333;
}

nav a:hover {
  color: #2f6fb4;
}

/* メイン */
main {
  padding: 20px;
}

/* 地図 */
.map-container {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}

.map-container svg,
.map-container object {
  width: 100%;
  height: auto;
  display: block;
}

/* 地図カラー */
.map-container path {
  fill: #2f6fb4;
  stroke: #ffffff;
  stroke-width: 0.6;
  transition: 0.2s;
}

.map-container path:hover {
  opacity: 0.8;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">釣り行こNAVI</div>

  <nav>
    <a href="#">登録地点</a>
    <a href="#">釣りニュース</a>
    <a href="#">全国地図</a>
    <a href="#">その他</a>
  </nav>
</header>

<main>
  <div class="map-container">
    <object data="japan.svg" type="image/svg+xml"></object>
  </div>
</main>

</body>
</html>
