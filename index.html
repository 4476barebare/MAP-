<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り行こNAVI</title>

<!-- ヘッダー用 CSS -->
<link rel="stylesheet" href="header.css">
<!-- Map専用 CSS -->
<link rel="stylesheet" href="map.css">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-sA+e2UfM2M4u7dHMBk2sPtyb4Y4I/6b0o+N/m0qMCXk="
  crossorigin=""
/>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

main {
  background-color: #191970;
  max-width: 100%;
  margin: 0;
  padding: 0;
}

.map {
  text-align: center;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">釣り行こNAVI</div>
    <nav class="nav">
      <div class="accordion-wrapper">
        <button class="accordion-btn">登録地点 ▼</button>
        <div class="accordion-panel">
          <ul class="location-list" id="locationList">
            <li>新潟 <button class="delete-btn">✖️</button></li>
            <li>群馬 <button class="delete-btn">✖️</button></li>
            <li>飯岡漁港(千葉) <button class="delete-btn">✖️</button></li>
          </ul>
        </div>
      </div>
      <a href="#" id="newsBtn">釣りNEWS</a>
      <a href="#">全国地図</a>
      <a href="#">その他</a>
    </nav>
  </div>
</header>

<main>
  <div class="map">
    <div class="japan-map" id="map"></div>
  </div>
</main>

<div class="ad">広告スペース</div>

<footer>© 釣り行こNAVI</footer>

<!-- ニュースオーバーレイ -->
<div id="newsOverlay">
  <div class="news-window">
    <button id="closeNews">閉じる</button>
    <div class="news-content"></div>
  </div>
</div>

<!-- JS -->
<script src="header.js"></script>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-vw26f91ue5K4Y/wCjx2c0Dxq0MYN6fBR0rKJtYngsBM="
  crossorigin="">
</script>

<script src="map.js"></script>

<script>
// ★ページロード時のハッシュチェックでLeaflet起動
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#','').toUpperCase();
  if(hash.includes('/')) {
    const parts = hash.split('/');
    const prefId = parts[1];
    if(window.switchToLeaflet && prefId){
      window.switchToLeaflet(prefId);
    }
  }
});
</script>

</body>
</html>
