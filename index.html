<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本釣りマップ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    .map-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .mainmap {
      min-width: 600px;
      max-width: 900px;
    }

    .okinawa {
      width: 120px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    path {
      cursor: pointer;
      transition: fill 0.2s;
    }

    path:hover {
      fill: #8fc98f;
    }
  </style>
</head>
<body>

<h1>日本釣りマップ</h1>

<div class="map-wrap">
  <!-- 本土SVG -->
  <div class="mainmap">
    <object type="image/svg+xml" data="japan-main.svg" aria-label="日本本土"></object>
  </div>

  <!-- 沖縄分離SVG -->
  <div class="okinawa">
    <object type="image/svg+xml" data="okinawa.svg" aria-label="沖縄"></object>
  </div>
</div>

<script>
  // SVG内のパスをクリックしたら名前を表示
  function setupSVG(obj) {
    const svgDoc = obj.contentDocument;
    if (!svgDoc) return;
    const paths = svgDoc.querySelectorAll('path');
    paths.forEach(path => {
      path.addEventListener('click', () => {
        const name = path.getAttribute('name') || '不明';
        alert(name + ' を選択しました！');
      });
    });
  }

  window.addEventListener('load', () => {
    document.querySelectorAll('object[type="image/svg+xml"]').forEach(obj => {
      obj.addEventListener('load', () => setupSVG(obj));
    });
  });
</script>

</body>
</html>
