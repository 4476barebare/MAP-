<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weather scroll snap</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: sans-serif;
}

/* ================================
   横スクロール全体
================================ */
.weather-scroll {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  gap: 8px;
  padding: 8px;
}

/* スクロールバー消す（iOS対策） */
.weather-scroll::-webkit-scrollbar {
  display: none;
}

/* ================================
   共通ブロック
================================ */
.weather-block {
  scroll-snap-align: start;
  flex-shrink: 0;
  border-radius: 6px;
  overflow: hidden;
}

/* ================================
   HOURLY
================================ */
.hourly {
  display: flex;
  font-size: 8px;
  color: #fff;
  background: rgba(0,0,0,0.5);
  height: 70px; /* ★基準高さ */
  min-width: 260px;
}

/* 左ラベル */
.weather-labels {
  flex-shrink: 0;
  background: rgba(0,0,0,0.3);
}

.weather-label {
  height: 14px;
  display: flex;
  align-items: center;
  padding: 0 2px;
  font-size: 6px;
}

/* 右 */
.weather-table {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.weather-row {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  height: 14px;
  gap: 2px;
}

.weather-cell {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ================================
   DAILY
================================ */
.daily {
  background: rgba(0,0,0,0.5);
  color: #fff;
  height: 70px; /* ★hourlyと完全一致 */
  display: flex;
  gap: 4px;
  padding: 4px;
}

/* 各日ボタン */
.day {
  width: 50px; /* ★固定幅 */
  flex-shrink: 0;
  background: rgba(0,0,0,0.3);
  border-radius: 4px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  font-size: 10px;
}

/* 天気アイコン */
.icon {
  font-size: 14px;
}

/* 気温 */
.max {
  color: #ff6b6b;
}

.min {
  color: #6bbcff;
}
</style>
</head>

<body>

<div class="weather-scroll">

  <!-- HOURLY 1 -->
  <div class="weather-block hourly">
    <div class="weather-labels">
      <div class="weather-label">時</div>
      <div class="weather-label">天気</div>
      <div class="weather-label">気温</div>
      <div class="weather-label">風</div>
      <div class="weather-label">波</div>
    </div>

    <div class="weather-table">
      <div class="weather-row">
        <div class="weather-cell">0</div><div class="weather-cell">1</div><div class="weather-cell">2</div>
        <div class="weather-cell">3</div><div class="weather-cell">4</div><div class="weather-cell">5</div>
        <div class="weather-cell">6</div><div class="weather-cell">7</div><div class="weather-cell">8</div>
        <div class="weather-cell">9</div><div class="weather-cell">10</div><div class="weather-cell">11</div>
      </div>

      <div class="weather-row">
        <div class="weather-cell">☀</div><div class="weather-cell">☀</div><div class="weather-cell">☁</div>
        <div class="weather-cell">☁</div><div class="weather-cell">☂</div><div class="weather-cell">☂</div>
        <div class="weather-cell">☁</div><div class="weather-cell">☀</div><div class="weather-cell">☀</div>
        <div class="weather-cell">☀</div><div class="weather-cell">☀</div><div class="weather-cell">☀</div>
      </div>

      <div class="weather-row">
        <div class="weather-cell">20</div><div class="weather-cell">20</div><div class="weather-cell">19</div>
        <div class="weather-cell">19</div><div class="weather-cell">18</div><div class="weather-cell">18</div>
        <div class="weather-cell">19</div><div class="weather-cell">21</div><div class="weather-cell">23</div>
        <div class="weather-cell">24</div><div class="weather-cell">25</div><div class="weather-cell">26</div>
      </div>

      <div class="weather-row">
        <div class="weather-cell">北</div><div class="weather-cell">北</div><div class="weather-cell">北東</div>
        <div class="weather-cell">東</div><div class="weather-cell">東</div><div class="weather-cell">東</div>
        <div class="weather-cell">南東</div><div class="weather-cell">南</div><div class="weather-cell">南</div>
        <div class="weather-cell">南西</div><div class="weather-cell">西</div><div class="weather-cell">北西</div>
      </div>

      <div class="weather-row">
        <div class="weather-cell">1.0</div><div class="weather-cell">1.0</div><div class="weather-cell">1.2</div>
        <div class="weather-cell">1.3</div><div class="weather-cell">1.5</div><div class="weather-cell">1.6</div>
        <div class="weather-cell">1.4</div><div class="weather-cell">1.2</div><div class="weather-cell">1.1</div>
        <div class="weather-cell">1.0</div><div class="weather-cell">0.9</div><div class="weather-cell">0.8</div>
      </div>
    </div>
  </div>

  <!-- HOURLY 2（ダミー） -->
  <div class="weather-block hourly"></div>

  <!-- DAILY -->
  <div class="weather-block daily">
    <div class="day">
      <div>月</div>
      <div class="icon">☀</div>
      <div class="max">28</div>
      <div class="min">21</div>
    </div>

    <div class="day">
      <div>火</div>
      <div class="icon">☁</div>
      <div class="max">26</div>
      <div class="min">20</div>
    </div>

    <div class="day">
      <div>水</div>
      <div class="icon">☂</div>
      <div class="max">24</div>
      <div class="min">19</div>
    </div>

    <div class="day">
      <div>木</div>
      <div class="icon">☀</div>
      <div class="max">27</div>
      <div class="min">21</div>
    </div>
  </div>

</div>

</body>
</html>
