<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Whether Debug</title>
<style>
body {
    font-family: monospace;
    background: #111;
    color: #0f0;
    padding: 10px;
}
pre {
    white-space: pre-wrap;
    word-break: break-all;
}
</style>
</head>
<body>

<h3>Whether Debug</h3>
<pre id="debug"></pre>

<script src="./whetherNode.js"></script>

<script>
// ================================
// в–  иЁӯе®ҡ
// ================================
const region = "KANTO";

const prefs = [
    "CHIBA"
];

// ================================
// в–  гғҮгғҗгғғгӮ°еҮәеҠӣ
// ================================
function debugLog(...args) {

    const el = document.getElementById("debug");

    const msg = args.map(a =>
        typeof a === "object"
            ? JSON.stringify(a, null, 2)
            : String(a)
    ).join(" ");

    console.log(msg);
    el.textContent += msg + "\n";
}

// ================================
// в–  JSONиӘӯгҒҝиҫјгҒҝпјҲstationз”Ёпјү
// ================================
async function loadJSON(path) {

    try {
        const res = await fetch(path);

        if (!res.ok) {
            debugLog("вқҢ JSON fetchеӨұж•—:", path);
            return null;
        }

        const json = await res.json();

        const data = json.data || json;

        debugLog("вң… JSON:", path, Array.isArray(data) ? data.length : "дёҚжҳҺ");

        return data;

    } catch (e) {
        debugLog("вқҢ JSONдҫӢеӨ–:", path, e);
        return null;
    }
}

// ================================
// в–  CSVиӘӯгҒҝиҫјгҒҝпјҲspotsз”Ёпјү
// ================================
async function loadCSV(path) {

    try {
        const res = await fetch(path);

        if (!res.ok) {
            debugLog("вқҢ CSV fetchеӨұж•—:", path);
            return [];
        }

        const text = await res.text();

        const lines = text.split("\n").filter(Boolean);

        const header = lines.shift().split(",");

        const data = lines.map(line => {

            const cols = line.split(",");

            const obj = {};

            header.forEach((h, i) => {
                obj[h] = cols[i];
            });

            // еһӢиЈңжӯЈпјҲйҮҚиҰҒпјү
            obj.lat = Number(obj.lat);
            obj.lng = Number(obj.lng);

            return obj;
        });

        debugLog("вң… CSV:", path, data.length);

        return data;

    } catch (e) {
        debugLog("вқҢ CSVдҫӢеӨ–:", path, e);
        return [];
    }
}

// ================================
// в–  spotsиӘӯгҒҝиҫјгҒҝ
// ================================
async function loadSpots(pref) {

    const path = `./${region}/${pref}_location.csv`;

    const data = await loadCSV(path);

    if (!data.length) {
        debugLog("вқҢ spotsгҒӘгҒ—:", pref);
        return [];
    }

    return data;
}

// ================================
// в–  гғЎгӮӨгғіеҮҰзҗҶ
// ================================
async function runTest() {

    debugLog("=== START ===");

    // ----------------
    // stationпјҲ1еӣһгҒ гҒ‘пјү
    // ----------------
    const stations = await loadJSON(`./data/${region}_load.json`);

    if (!stations) {
        debugLog("вқҢ stationиӘӯгҒҝиҫјгҒҝеӨұж•—");
        return;
    }

    debugLog("stations:", stations.length);

    // ----------------
    // prefгғ«гғјгғ—
    // ----------------
    for (const pref of prefs) {

        debugLog("----", pref, "----");

        let spots = await loadSpots(pref);

        if (spots.length === 0) continue;

        // ----------------
        // whetherе®ҹиЎҢ
        // ----------------
        runWhether(spots, stations);

        const count = spots.filter(s => s.whether).length;

        debugLog("еҸ–еҫ—:", count, "/", spots.length);

        // ----------------
        // жңӘеҸ–еҫ—гғҒгӮ§гғғгӮҜ
        // ----------------
        const missing = spots.filter(s =>
            s.icon === "spot" && !s.whether
        );

        if (missing.length > 0) {
            debugLog("жңӘеҸ–еҫ—:", missing.length);
            debugLog("дҫӢ:", missing.slice(0, 2));
        }

        // ----------------
        // гӮөгғігғ—гғ«зўәиӘҚ
        // ----------------
        const sample = spots.find(s => s.whether);

        if (sample) {
            debugLog("sample:", sample.name);
        }

        // ----------------
        // гғЎгғўгғӘи§Јж”ҫ
        // ----------------
        spots = null;
    }

    debugLog("=== END ===");
}

// ================================
runTest();

</script>

</body>
</html>
